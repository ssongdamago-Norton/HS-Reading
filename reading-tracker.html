<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>한성과학고 독서 프로젝트 트래커</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&family=IBM+Plex+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0B0D14;
  --surface: #141720;
  --surface2: #1C1F2E;
  --border: rgba(255,255,255,0.06);
  --text: #E8E8E8;
  --text2: rgba(255,255,255,0.5);
  --text3: rgba(255,255,255,0.25);
  --g1: #E8A87C; --g1a: #D6725C;
  --g2: #85B8CB; --g2a: #4A8FA8;
  --g3: #C3A6D8; --g3a: #8B5FB0;
  --none: #555; --reading: #F5A623; --read: #7ED321; --logged: #9B59B6;
  --serif: 'Noto Serif KR', Georgia, serif;
  --sans: 'IBM Plex Sans KR', 'Noto Sans KR', -apple-system, sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 10px; }
button { font-family: var(--sans); cursor: pointer; border: none; background: none; }
textarea { font-family: var(--sans); }
textarea:focus { outline: none; border-color: rgba(255,255,255,0.2) !important; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes scaleIn {
  from { opacity: 0; transform: scale(0.95); }
  to { opacity: 1; transform: scale(1); }
}
@keyframes ripple {
  0% { transform: scale(1); }
  50% { transform: scale(1.3); }
  100% { transform: scale(1); }
}

/* ─── HEADER ─── */
.header {
  background: linear-gradient(180deg, #151822 0%, var(--bg) 100%);
  padding: 28px 20px 18px;
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 100;
  backdrop-filter: blur(20px);
}
.header-inner {
  max-width: 740px; margin: 0 auto;
  display: flex; justify-content: space-between; align-items: flex-start;
}
.header-label {
  font-size: 9px; font-weight: 700; letter-spacing: 3.5px;
  color: var(--text3); margin-bottom: 6px;
}
.header-title {
  font-family: var(--serif); font-weight: 900;
  font-size: 21px; color: #fff; line-height: 1.3; margin-bottom: 3px;
}
.header-sub { font-size: 12px; color: var(--text3); }
.header-stat { text-align: right; }
.big-num {
  font-family: var(--serif); font-size: 38px; font-weight: 900; color: #fff;
}
.big-denom { font-size: 16px; color: var(--text3); font-weight: 600; }
.big-label { font-size: 10px; color: var(--text3); margin-top: 2px; }

.progress-strip {
  display: flex; gap: 3px; flex-wrap: wrap;
  max-width: 740px; margin: 14px auto 0;
}
.strip-dot {
  width: 8px; height: 8px; border-radius: 2px;
  transition: all 0.3s ease;
}

/* ─── NAV ─── */
.nav-bar {
  max-width: 740px; margin: 0 auto;
  padding: 16px 20px 0;
  display: flex; gap: 6px; align-items: center;
  justify-content: space-between;
}
.view-toggle {
  display: flex; gap: 2px;
  background: rgba(255,255,255,0.05); border-radius: 10px; padding: 3px;
}
.view-btn {
  padding: 7px 16px; border-radius: 8px;
  font-size: 12px; font-weight: 600; color: var(--text2);
  transition: all 0.2s;
}
.view-btn.active {
  background: #fff; color: #1a1a1a;
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
}

/* ─── GRADE TABS ─── */
.grade-tabs {
  display: flex; gap: 10px;
  max-width: 740px; margin: 16px auto;
  padding: 0 20px;
}
.grade-tab {
  flex: 1; padding: 14px 10px; border-radius: 12px;
  border: 1.5px solid var(--border);
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  transition: all 0.25s;
}
.grade-tab:hover { background: rgba(255,255,255,0.03); }
.grade-tab.active { border-width: 2px; }
.grade-num { font-family: var(--serif); font-size: 26px; font-weight: 900; }
.grade-lbl { font-size: 11px; color: var(--text2); font-weight: 600; }
.grade-bar { width: 100%; height: 3px; background: rgba(255,255,255,0.08); border-radius: 2px; margin-top: 6px; overflow: hidden; }
.grade-bar-fill { height: 100%; border-radius: 2px; transition: width 0.5s ease; }
.grade-pct { font-size: 11px; font-weight: 700; margin-top: 3px; }

/* ─── GRADE INFO ─── */
.grade-info {
  max-width: 740px; margin: 0 auto 20px;
  padding: 20px 20px 20px 24px;
  border-left: 3px solid;
  background: rgba(255,255,255,0.02);
  border-radius: 0 12px 12px 0;
}
.grade-info h2 {
  font-family: var(--serif); font-size: 18px; font-weight: 700; margin-bottom: 6px;
}
.grade-info p { font-size: 13px; color: var(--text2); line-height: 1.6; }
.tip-box {
  margin-top: 12px; padding: 12px;
  background: rgba(255,255,255,0.03);
  border-radius: 8px; font-size: 12px; line-height: 1.7; color: var(--text2);
}
.tip-tag {
  display: inline-block; padding: 2px 8px;
  background: rgba(255,255,255,0.06); border-radius: 4px;
  font-size: 10px; font-weight: 700; margin-right: 8px; color: var(--text2);
}

/* ─── SEMESTER ─── */
.semester {
  max-width: 740px; margin: 0 auto 28px;
  padding: 0 20px;
  animation: fadeUp 0.4s ease both;
}
.sem-header {
  display: flex; align-items: center; gap: 10px; margin-bottom: 14px;
}
.sem-icon { font-size: 16px; }
.sem-label { font-size: 14px; font-weight: 700; color: #fff; white-space: nowrap; }
.sem-line { flex: 1; height: 1px; background: var(--border); }
.sem-count { font-size: 12px; color: var(--text3); font-weight: 600; }

/* ─── BOOK CARD ─── */
.book-card {
  background: var(--surface);
  border-radius: 12px;
  border-left: 3px solid var(--none);
  margin-bottom: 8px;
  overflow: hidden;
  transition: all 0.25s;
}
.book-card:hover { background: var(--surface2); }
.book-card.s-reading { border-left-color: var(--reading); }
.book-card.s-read { border-left-color: var(--read); }
.book-card.s-logged { border-left-color: var(--logged); }
.book-card.expanded { box-shadow: 0 8px 32px rgba(0,0,0,0.35); }

.book-top {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 16px; cursor: pointer; user-select: none;
}
.status-btn {
  width: 38px; height: 38px; border-radius: 50%;
  border: 2px solid var(--none); color: var(--none);
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; flex-shrink: 0; transition: all 0.2s;
}
.status-btn:active { animation: ripple 0.3s ease; }
.status-btn.s-reading { border-color: var(--reading); color: var(--reading); }
.status-btn.s-read { border-color: var(--read); color: var(--read); }
.status-btn.s-logged { border-color: var(--logged); color: var(--logged); }

.book-info { flex: 1; min-width: 0; }
.book-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
.field-tag {
  font-size: 10px; font-weight: 700; letter-spacing: 0.4px;
  padding: 2px 7px; border-radius: 4px;
  border: 1px solid rgba(255,255,255,0.1);
}
.book-idx { font-size: 10px; color: var(--text3); font-weight: 600; }
.book-title {
  font-family: var(--serif); font-weight: 700;
  font-size: 15px; color: #fff; line-height: 1.4;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.book-author { font-size: 12px; color: var(--text3); margin-top: 2px; }
.chevron {
  font-size: 22px; color: var(--text3);
  transition: transform 0.2s; flex-shrink: 0; font-weight: 300;
}
.book-card.expanded .chevron { transform: rotate(90deg); }

/* ─── EXPANDED ─── */
.book-expand {
  padding: 0 16px 16px 66px;
  animation: scaleIn 0.2s ease;
}
.info-box {
  padding: 14px; border-radius: 10px; margin-bottom: 10px;
  font-size: 13px; line-height: 1.7; color: rgba(255,255,255,0.6);
}
.info-box.why { background: rgba(255,255,255,0.03); }
.info-box.log-guide {
  background: rgba(155,89,182,0.07);
  border-left: 2px solid rgba(155,89,182,0.25);
}
.info-box.note { background: rgba(255,255,255,0.02); }
.mini-label {
  font-size: 10px; font-weight: 700; color: var(--text3);
  letter-spacing: 1px; margin-bottom: 6px;
}
.note-input {
  width: 100%; background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.06); border-radius: 8px;
  padding: 10px; color: #ddd; font-size: 13px; line-height: 1.6;
  resize: vertical; min-height: 70px;
}

/* ─── ROADMAP ─── */
.roadmap { max-width: 740px; margin: 0 auto; padding: 0 20px; }
.rm-semester { margin-bottom: 16px; }
.rm-sem-head {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 0 8px;
}
.rm-sem-icon { font-size: 18px; }
.rm-sem-label { font-size: 15px; font-weight: 700; color: #fff; }
.rm-timeline { padding-left: 8px; }
.rm-node { display: flex; gap: 16px; min-height: 70px; }
.rm-dot-col {
  display: flex; flex-direction: column; align-items: center; width: 28px;
}
.rm-dot {
  width: 26px; height: 26px; border-radius: 50%;
  border: 2.5px solid var(--none);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; flex-shrink: 0; transition: all 0.3s;
  background: var(--bg);
}
.rm-dot.s-reading { border-color: var(--reading); color: var(--reading); }
.rm-dot.s-read { border-color: var(--read); color: var(--read); }
.rm-dot.s-logged { border-color: var(--logged); color: var(--logged); background: var(--logged); color: #fff; }
.rm-line {
  width: 2px; flex: 1; margin: 4px 0;
  background: rgba(255,255,255,0.06);
}
.rm-card {
  flex: 1; padding: 6px 14px 14px;
  background: rgba(255,255,255,0.02); border-radius: 10px;
  margin-bottom: 8px; transition: all 0.2s;
}
.rm-card:hover { background: rgba(255,255,255,0.04); }
.rm-field { font-size: 10px; font-weight: 700; letter-spacing: 0.5px; }
.rm-title {
  font-family: var(--serif); font-weight: 700;
  font-size: 14px; color: #fff; margin-top: 4px; line-height: 1.4;
}
.rm-author { font-size: 11px; color: var(--text3); margin-top: 2px; }
.rm-status { font-size: 11px; font-weight: 600; margin-top: 6px; }
.rm-connector {
  text-align: center; font-size: 20px;
  color: rgba(255,255,255,0.1); padding: 2px 0;
}

/* ─── STATS ─── */
.stats-row {
  max-width: 740px; margin: 0 auto 20px; padding: 0 20px;
  display: flex; gap: 10px;
}
.stat-card {
  flex: 1; padding: 16px; border-radius: 12px;
  background: var(--surface); text-align: center;
}
.stat-num {
  font-family: var(--serif); font-size: 28px; font-weight: 900;
}
.stat-label { font-size: 11px; color: var(--text2); margin-top: 2px; }

/* ─── LEGEND ─── */
.legend {
  display: flex; flex-wrap: wrap; gap: 14px; align-items: center;
  max-width: 740px; margin: 28px auto 0; padding: 16px 20px;
  border-top: 1px solid var(--border);
}
.legend-item { display: flex; align-items: center; gap: 6px; }
.legend-dot {
  width: 18px; height: 18px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; color: #fff;
}
.legend-label { font-size: 11px; color: var(--text3); }
.legend-hint {
  margin-left: auto; font-size: 10px; color: var(--text3); opacity: 0.6;
}

/* ─── RESPONSIVE ─── */
@media (max-width: 480px) {
  .header-title { font-size: 18px; }
  .big-num { font-size: 30px; }
  .grade-num { font-size: 22px; }
  .book-expand { padding-left: 16px; }
  .book-title { white-space: normal; }
  .stats-row { flex-wrap: wrap; }
  .stat-card { min-width: calc(50% - 5px); }
}
</style>
</head>

<script>

/* ═══════════════════════ STATE ═══════════════════════ */
let progress = JSON.parse(localStorage.getItem("hs-progress") || "{}");
let notes = JSON.parse(localStorage.getItem("hs-notes") || "{}");
let activeGrade = 1;
let activeView = "tracker";
let expandedBook = null;

function saveProgress() { localStorage.setItem("hs-progress", JSON.stringify(progress)); }
function saveNotes() { localStorage.setItem("hs-notes", JSON.stringify(notes)); }

function cycleStatus(id) {
  const cur = progress[id] || "none";
  const idx = STATUS_ORDER.indexOf(cur);
  progress[id] = STATUS_ORDER[(idx + 1) % STATUS_ORDER.length];
  saveProgress();
  render();
}

function toggleBook(id) {
  expandedBook = expandedBook === id ? null : id;
  render();
}

function updateNote(id, val) {
  notes[id] = val;
  saveNotes();
}

function setGrade(g) { activeGrade = g; expandedBook = null; render(); }
function setView(v) { activeView = v; render(); }

/* ═══════════════════════ HELPERS ═══════════════════════ */
function allBooks() { return PLAN.flatMap(g => g.semesters.flatMap(s => s.books)); }
function gradeBooks(g) { return PLAN.find(p => p.grade === g).semesters.flatMap(s => s.books); }
function countStatus(books, status) { return books.filter(b => (progress[b.id]||"none") === status).length; }
function pct(books) { const t = books.length; return t ? Math.round(countStatus(books,"logged") / t * 100) : 0; }
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

/* ═══════════════════════ RENDER ═══════════════════════ */

      ${ab.map(b => {
        const s = progress[b.id] || "none";
        return `<div class="strip-dot" style="background:${STATUS[s].color};opacity:${s==="none"?0.25:1}" title="${esc(b.title)} — ${STATUS[s].label}"></div>`;
      }).join('')}
    </div>
  </div>`;

  /* ── NAV ── */
  html += `<div class="nav-bar">
    <div class="view-toggle">
      <button class="view-btn ${activeView==='tracker'?'active':''}" onclick="setView('tracker')">📚 진도 관리</button>
      <button class="view-btn ${activeView==='roadmap'?'active':''}" onclick="setView('roadmap')">🗺️ 로드맵</button>
    </div>
  </div>`;

  /* ── GRADE TABS ── */
  html += `<div class="grade-tabs">`;
  PLAN.forEach(g => {
    const gb2 = gradeBooks(g.grade);
    const p = pct(gb2);
    const isActive = activeGrade === g.grade;
    html += `<button class="grade-tab ${isActive?'active':''}" style="border-color:${isActive?g.color:'rgba(255,255,255,0.08)'};background:${isActive?g.color+'15':'transparent'}" onclick="setGrade(${g.grade})">
      <span class="grade-num" style="color:${g.color}">${g.grade}</span>
      <span class="grade-lbl">학년</span>
      <div class="grade-bar"><div class="grade-bar-fill" style="width:${p}%;background:${g.color}"></div></div>
      <span class="grade-pct" style="color:${g.color}">${p}%</span>
    </button>`;
  });
  html += `</div>`;

  /* ── STATS ROW ── */
  const reading = countStatus(gb,"reading");
  const read = countStatus(gb,"read");
  const logged = countStatus(gb,"logged");
  const notStarted = gb.length - reading - read - logged;
  html += `<div class="stats-row">
    <div class="stat-card"><div class="stat-num" style="color:var(--text3)">${notStarted}</div><div class="stat-label">읽기 전</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--reading)">${reading}</div><div class="stat-label">읽는 중</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--read)">${read}</div><div class="stat-label">독서 완료</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--logged)">${logged}</div><div class="stat-label">독서록 완료</div></div>
  </div>`;

  /* ── GRADE INFO ── */
  html += `<div class="grade-info" style="border-left-color:${gd.color}">
    <h2 style="color:${gd.color}">${gd.grade}학년 — ${esc(gd.title)}</h2>
    <p>${esc(gd.desc)}</p>
    <div class="tip-box"><span class="tip-tag">독서록 전략</span>${esc(gd.logTip)}</div>
  </div>`;

  /* ── CONTENT ── */
  if (activeView === "tracker") {
    html += renderTracker(gd);
  } else {
    html += renderRoadmap(gd);
  }

  /* ── LEGEND ── */
  html += `<div class="legend">`;
  STATUS_ORDER.forEach(k => {
    const v = STATUS[k];
    html += `<div class="legend-item"><span class="legend-dot" style="background:${v.color}">${v.emoji}</span><span class="legend-label">${v.label}</span></div>`;
  });
  html += `<span class="legend-hint">⟲ 원형 버튼 클릭으로 상태 변경 · 데이터 자동 저장</span></div>`;

  document.getElementById('app').innerHTML = html;

  // Rebind note textareas
  document.querySelectorAll('.note-input').forEach(ta => {
    ta.addEventListener('input', function() { updateNote(this.dataset.id, this.value); });
  });
}

function renderTracker(gd) {
  let html = '';
  let globalIdx = 0;
  gd.semesters.forEach((sem, si) => {
    const semLogged = countStatus(sem.books, "logged");
    html += `<div class="semester" style="animation-delay:${si*0.06}s">
      <div class="sem-header">
        <span class="sem-icon">${sem.icon}</span>
        <span class="sem-label">${esc(sem.label)}</span>
        <div class="sem-line"></div>
        <span class="sem-count">${semLogged}/${sem.books.length}</span>
      </div>`;

    sem.books.forEach(book => {
      globalIdx++;
      const s = progress[book.id] || "none";
      const sc = STATUS[s];
      const isOpen = expandedBook === book.id;
      const fc = FIELD_COLORS[book.field] || "#90A4AE";

      html += `<div class="book-card s-${s} ${isOpen?'expanded':''}">
        <div class="book-top" onclick="toggleBook('${book.id}')">
          <button class="status-btn s-${s}" onclick="event.stopPropagation();cycleStatus('${book.id}')" title="현재: ${sc.label} — 클릭하여 변경">${sc.emoji}</button>
          <div class="book-info">
            <div class="book-meta">
              <span class="field-tag" style="color:${fc};border-color:${fc}44">${esc(book.field)}</span>
              <span class="book-idx">#${String(globalIdx).padStart(2,'0')}</span>
            </div>
            <div class="book-title">${esc(book.title)}</div>
            ${book.author ? `<div class="book-author">${esc(book.author)}</div>` : ''}
          </div>
          <span class="chevron">›</span>
        </div>`;

      if (isOpen) {
        html += `<div class="book-expand">
          <div class="info-box why">
            <div class="mini-label">📖 선정 이유</div>
            ${esc(book.why)}
          </div>
          <div class="info-box log-guide">
            <div class="mini-label">📝 독서록 작성 가이드</div>
            ${esc(book.log)}
          </div>
          <div class="info-box note">
            <div class="mini-label">✏️ 나의 메모</div>
            <textarea class="note-input" data-id="${book.id}" placeholder="독서 중 떠오른 생각, 인상 깊은 구절, 질문 등을 자유롭게 기록하세요...">${esc(notes[book.id]||'')}</textarea>
          </div>
        </div>`;
      }
      html += `</div>`;
    });
    html += `</div>`;
  });
  return html;
}

function renderRoadmap(gd) {
  let html = `<div class="roadmap">`;
  gd.semesters.forEach((sem, si) => {
    html += `<div class="rm-semester">
      <div class="rm-sem-head">
        <span class="rm-sem-icon">${sem.icon}</span>
        <span class="rm-sem-label">${esc(sem.label)}</span>
      </div>
      <div class="rm-timeline">`;

    sem.books.forEach((book, bi) => {
      const s = progress[book.id] || "none";
      const sc = STATUS[s];
      const fc = FIELD_COLORS[book.field] || "#90A4AE";
      const isLast = bi === sem.books.length - 1;

      html += `<div class="rm-node">
        <div class="rm-dot-col">
          <div class="rm-dot s-${s}" onclick="cycleStatus('${book.id}')" style="cursor:pointer" title="${sc.label}">${sc.emoji}</div>
          ${!isLast ? '<div class="rm-line"></div>' : ''}
        </div>
        <div class="rm-card">
          <span class="rm-field" style="color:${fc}">${esc(book.field)}</span>
          <div class="rm-title">${esc(book.title)}</div>
          ${book.author ? `<div class="rm-author">${esc(book.author)}</div>` : ''}
          <div class="rm-status" style="color:${sc.color}">${sc.label}</div>
        </div>
      </div>`;
    });
    html += `</div></div>`;
    if (si < gd.semesters.length - 1) html += `<div class="rm-connector">⤷</div>`;
  });
  html += `</div>`;
  return html;
}

/* ═══════════════════════ INIT ═══════════════════════ */
render();
</script>
</body>
</html>
