<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>과학고 심화 독서 프로젝트 v2.0</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📖</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f172a;--card:#1e293b;--border:#334155;--text:#e2e8f0;--sub:#94a3b8;--dim:#64748b;--accent:#6366f1;--accent2:#38bdf8;--green:#10b981;--amber:#f59e0b;--rose:#f43f5e}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-tap-highlight-color:transparent}
.app{max-width:520px;margin:0 auto;padding:16px 16px 80px}
button{font-family:inherit;cursor:pointer}

/* ── Header ── */
.hdr{text-align:center;padding:24px 0 20px}
.hdr h1{font-size:22px;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr p{font-size:13px;color:var(--sub);margin-top:6px}

/* ── Progress Ring ── */
.ring-wrap{display:flex;justify-content:center;margin-bottom:20px}
.ring-box{text-align:center}
.ring-box svg{width:100px;height:100px}
.ring-track{fill:none;stroke:var(--border);stroke-width:8}
.ring-fill{fill:none;stroke:url(#grad);stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset .6s}
.ring-label{font-size:11px;color:var(--dim);margin-top:4px}
.ring-stats{display:flex;gap:20px;justify-content:center;margin-top:12px}
.ring-stat{text-align:center}
.ring-stat .n{font-size:20px;font-weight:800}
.ring-stat .l{font-size:11px;color:var(--dim)}

/* ── Grade Tabs ── */
.gtabs{display:flex;gap:8px;margin-bottom:20px}
.gtab{flex:1;padding:10px;border:1px solid var(--border);border-radius:12px;background:var(--card);color:var(--sub);font-size:13px;font-weight:700;text-align:center;transition:.2s}
.gtab.on{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border-color:transparent;box-shadow:0 4px 15px rgba(99,102,241,.3)}
.gtab small{display:block;font-size:11px;font-weight:400;margin-top:2px;opacity:.8}

/* ── Roadmap ── */
.roadmap{position:relative;padding-left:32px}
.roadmap::before{content:'';position:absolute;left:13px;top:0;bottom:0;width:2px;background:linear-gradient(to bottom,var(--accent),var(--accent2),var(--green))}
.rm-item{position:relative;margin-bottom:14px}
.rm-dot{position:absolute;left:-32px;top:14px;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;cursor:pointer;transition:.3s;z-index:1}
.rm-dot.s0{background:var(--card);border:2px solid var(--border);color:var(--dim)}
.rm-dot.s1{background:var(--card);border:2px solid var(--accent2);color:var(--accent2)}
.rm-dot.s2{background:var(--green);border:2px solid var(--green);color:#fff}
.rm-dot.s3{background:var(--accent);border:2px solid var(--accent);color:#fff}
.rm-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;transition:.2s}
.rm-card:hover{border-color:#475569}
.rm-top{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.badge{display:inline-block;padding:2px 10px;border-radius:20px;color:#fff;font-size:11px;font-weight:600}
.rm-title{font-size:15px;font-weight:700;color:#f1f5f9}
.rm-author{font-size:13px;color:var(--dim);margin-top:3px}
.rm-status{font-size:11px;color:var(--sub);margin-top:6px;display:flex;align-items:center;gap:4px}

/* ── Action Buttons ── */
.rm-actions{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.abtn{padding:7px 14px;border-radius:8px;border:1px solid var(--border);background:var(--bg);font-size:12px;font-weight:600;transition:.2s}
.abtn:hover{border-color:var(--accent)}
.abtn.rep{color:#a78bfa}.abtn.info{color:var(--accent2)}.abtn.fc{color:var(--green)}

/* ── Detail Panel ── */
.panel{background:var(--card);border-radius:14px;padding:18px;margin-top:10px;animation:fadeIn .3s}
@keyframes fadeIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:none}}
.panel-tabs{display:flex;gap:6px;margin-bottom:14px}
.ptab{flex:1;padding:7px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--sub);font-size:11px;font-weight:600;text-align:center;transition:.2s}
.ptab.on{background:var(--accent);color:#fff;border-color:transparent}
.stitle{font-size:14px;font-weight:700;color:#f1f5f9;margin-bottom:10px}
.stext{font-size:13px;line-height:1.8;color:#cbd5e1}
.episode{display:flex;gap:8px;margin-bottom:8px}
.ep-n{width:22px;height:22px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:2px}
.key-row{display:flex;gap:8px;margin-bottom:10px}
.key-n{width:26px;height:26px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.key-t{font-size:13px;line-height:1.6;color:var(--text);font-weight:500}
.report-box{background:var(--bg);border-radius:12px;padding:16px;font-size:13px;line-height:2;color:#cbd5e1;border:1px solid var(--border);text-indent:1em}
.char-count{text-align:right;font-size:11px;color:var(--dim);margin-top:6px}

/* ── Flash Cards ── */
.fc-bar{height:4px;background:var(--border);border-radius:2px;margin-bottom:14px;overflow:hidden}
.fc-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;transition:width .3s}
.fc-counter{text-align:center;font-size:13px;color:var(--sub);margin-bottom:10px}
.fc-area{min-height:250px;display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none;-webkit-user-select:none}
.fc-card{width:100%;min-height:240px;border-radius:16px;padding:24px;display:flex;align-items:center;justify-content:center;transition:.3s}
.fc-front{background:linear-gradient(145deg,var(--card),var(--bg));border:2px solid var(--accent);box-shadow:0 0 30px rgba(99,102,241,.12)}
.fc-back{background:linear-gradient(145deg,#064e3b,var(--bg));border:2px solid var(--green);box-shadow:0 0 30px rgba(16,185,129,.12)}
.fc-inner{text-align:center;width:100%}
.fc-icon{width:36px;height:36px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#fff;margin-bottom:14px}
.fc-icon.q{background:var(--accent)}.fc-icon.a{background:var(--green)}
.fc-text{font-size:14px;line-height:1.8;color:#f1f5f9;font-weight:500}
.fc-hint{font-size:11px;color:var(--dim);margin-top:14px}
.fc-nav{display:flex;justify-content:space-between;align-items:center;margin-top:14px}
.fc-btn{padding:10px 18px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:13px;font-weight:600;transition:.2s}
.fc-btn:hover:not(:disabled){background:#334155}.fc-btn:disabled{opacity:.3;cursor:default}
.fc-mid{color:#cbd5e1;font-size:13px}
.fc-swipe{text-align:center;font-size:11px;color:var(--dim);margin-top:6px}

/* ── Coming Soon ── */
.coming{background:var(--card);border-radius:12px;padding:16px;margin-bottom:16px;border:1px solid var(--border)}
.coming h3{font-size:14px;margin-bottom:6px}.coming p{font-size:12px;color:var(--sub)}

/* ── Back ── */
.back{background:none;border:none;color:var(--accent2);font-size:14px;font-weight:600;padding:8px 0}

/* ── Footer ── */
.footer{text-align:center;padding:30px 0 12px;font-size:12px;color:var(--dim)}
.footer .v{font-size:11px;color:#475569;margin-top:4px}

/* ── Hidden ── */
.hide{display:none!important}
</style>
</head>
<body>
<div class="app" id="app"></div>

<script>
/* ═══ DATA ═══ */
const GRADE1 = [
  {
    id:1, title:"페르마의 마지막 정리", author:"사이먼 싱", field:"수학",
    bio:"영국 과학 저술가·BBC 다큐 제작자. 케임브리지 입자물리학 박사. 복잡한 과학을 대중에게 풀어쓰는 능력으로 세계적 명성을 얻었다.",
    episodes:["BBC 다큐 제작 중 앤드루 와일스가 증명 완성 순간 흘린 눈물을 직접 카메라에 담았다.","《코드 북》으로 영국 왕립학회 과학도서상 수상, 암호학 대중화에 기여.","영국 학교 수학 커리큘럼 개선 캠페인을 직접 주도한 교육 운동가이기도 하다."],
    keys:["350년간의 집념이 수학사를 어떻게 변화시켰는지 보여준다.","수학은 계산이 아니라 아름다움과 우아함을 추구하는 창조적 활동이다.","실패와 좌절의 과정 자체가 학문 발전의 원동력이 된다.","서로 다른 수학 분야의 연결이 혁신적 돌파구를 만든다."],
    tpl:"사이먼 싱의 《페르마의 마지막 정리》는 x^n+y^n=z^n이라는 단순한 방정식 뒤에 숨겨진 350년 수학사를 추적한다. 나는 이 책에서 [가장 인상 깊었던 부분]에 주목했다. 특히 와일스가 7년간 비밀 연구 끝에 보여준 [구체적 에피소드]는 과학적 탐구의 본질을 깨닫게 했다. 핵심 메시지인 [본인이 파악한 메시지]는 현재 [연결 분야]에도 시사하는 바가 크다. 수학이 [본인의 깨달음]이라는 점에서 과학고 학생으로서 [학문적 방향 연결] 계기가 되었다. 다만 [비판적 시각]도 있었고, 이를 통해 [후속 탐구 방향]을 설정할 수 있었다.",
    cards:[
      ["페르마의 마지막 정리란?","x^n+y^n=z^n에서 n≥3일 때 양의 정수 해가 없다는 정리. 1637년 페르마가 책 여백에 적었으나 증명을 남기지 않았다."],
      ["와일스는 어떻게 증명했나?","7년간 비밀 연구 끝에 타니야마-시무라 추측을 증명, 간접적으로 페르마 정리를 증명(1995). 모듈러 형식과 타원곡선의 대응 관계가 핵심이다."],
      ["타니야마-시무라 추측의 아이디어는?","모든 타원곡선이 모듈러 형식에 대응한다는 추측. 이것이 참이면 페르마 반례가 될 타원곡선이 존재할 수 없다."],
      ["와일스 증명의 오류 발견과 수정","1993년 발표 후 코리바진-플래크 방법에 결함 발견. 1년간 제자 테일러와 함께 수정하여 1995년 최종 증명 완성."],
      ["피타고라스 정리와의 관계","x²+y²=z²는 무한히 많은 정수 해(피타고라스 삼조)가 있지만, 지수가 3 이상이면 해가 없다는 것이 페르마의 주장이다."],
      ["소피 제르맹의 기여","19세기 여성 수학자. 남성명(르블랑)으로 활동하며 특수 경우 증명에 기여. 소피 제르맹 소수 개념을 도입했다."],
      ["오일러의 기여","n=3인 경우(세제곱)에 대해 정수 해가 없음을 최초로 증명. 특수 경우 증명의 시작이었다."],
      ["무한강하법이란?","페르마가 고안한 증명 기법. 해가 존재하면 더 작은 해가 무한히 존재해야 하므로 모순. n=4 증명에 사용되었다."],
      ["수학의 다리 놓기","정수론·대수기하학·해석학 등 서로 다른 분야를 연결하여 문제를 해결하는 접근. 와일스 증명의 핵심 전략이다."],
      ["수학적 증명 vs 실험적 검증","수학은 논리적 증명만이 진리를 확정. 컴퓨터로 수조 개 사례를 확인해도 증명이 아니다."],
      ["괴델 불완전성 정리와의 관계","일부 수학 명제는 증명 불가능할 수 있다는 우려가 있었으나, 와일스가 실제 증명을 완성하며 해소."],
      ["갈루아와 군론의 연결","갈루아가 창시한 군론(추상대수학)이 와일스 증명에 필요한 수학적 도구의 기반이 되었다."],
      ["'여백이 너무 좁다'의 의미","페르마가 디오판토스 《산술》 여백에 남긴 말. 실제 증명이 있었는지는 수학사 최대 미스터리."],
      ["와일스의 비밀 연구, 윤리적 관점","학문적 협력 원칙에 어긋나지만, 미완성 결과 공개의 혼란 방지와 집중력 유지의 장점. 연구 공개성과 창의성의 균형 문제."],
      ["정수론의 현실 응용","RSA 암호(온라인 보안), 해시 함수(블록체인), 오류 정정 코드. 가장 추상적 수학이 정보사회 핵심 인프라가 된 사례."],
      ["랭글랜즈 프로그램이란?","정수론·대수기하학·표현론을 통합하려는 거대 연구. 타니야마-시무라 증명은 이 프로그램의 중요 성과."],
      ["2026년 AI와 수학 증명","AlphaProof·Lean 등 AI 자동 증명이 발전 중이나, 분야 간 창의적 연결은 아직 인간 고유 영역."],
      ["연구 윤리와 학문적 정직성","와일스의 오류 인정과 공개적 수정 과정이 과학적 정직성의 모범 사례. 실수를 숨기지 않는 태도가 핵심."],
      ["이 책의 한계점","수학적 내용의 심화 설명이 부족하고, 대중적 서술을 위해 일부 단순화된 부분이 있다."],
      ["후속 탐구 주제","① ABC 추측과 IUT 이론 논쟁 ② AI 수학 증명의 가능성 ③ 암호학과 정수론 ④ 밀레니엄 문제 7개"]
    ]
  },
  {
    id:2, title:"수학이 필요한 순간", author:"김민형", field:"수학",
    bio:"옥스퍼드·에든버러 대학교 수학과 교수. 서울대 졸업, 예일대 박사. 한국인 최초 IMU 집행위원. 산술기하학 분야 세계적 연구자.",
    episodes:["어린 시절 수학을 싫어했으나, 대학에서 추상대수학의 아름다움에 매료되어 수학자의 길을 걸었다.","BBC 라디오에 정기 출연하며 수학의 아름다움을 대중에게 전파.","과학고 학생들에게 '공식 암기보다 왜 그런지 묻는 습관'을 강조했다."],
    keys:["수학은 세상을 이해하는 가장 정밀한 언어이자 사고 도구이다.","불확실성 속에서 합리적 판단을 내리는 것이 수학적 사고의 핵심.","수학적 구조 발견은 자연의 숨겨진 질서를 읽는 행위이다.","수학 교육은 정답이 아니라 질문하는 법을 배우는 것이다."],
    tpl:"김민형 교수의 《수학이 필요한 순간》은 수학적 사고가 일상·학문에서 어떤 역할을 하는지 성찰하게 한다. [핵심 메시지]는 나의 [수학 학습 경험]과 연결되었다. 특히 [인상 깊은 예시]는 수학 인식을 바꾸는 계기가 되었다. [수학적 사고의 본질]을 깨달았으며, [진로 연결]에도 적용 가능하다. [비판적 관점]도 있었지만, 전체적으로 [종합 평가와 후속 방향]을 제시받았다.",
    cards:[
      ["'수학이 필요한 순간'이란?","복잡한 현실에서 본질을 추출하고, 불확실성 속에서 합리적 판단이 필요한 모든 순간. 수학은 세상을 구조적으로 이해하는 사고법이다."],
      ["추상화의 가치","구체적 사례에서 핵심 구조만 추출하는 능력. 사과 3개와 고양이 3마리에서 '3'을 분리하듯, 복잡한 현상의 본질을 파악하는 도구."],
      ["수학적 사고 vs 일상적 사고","일상은 직관·경험에 의존. 수학적 사고는 가정을 명확히 하고 논리적으로 결론에 도달. '왜?'라는 질문의 깊이가 핵심."],
      ["불확실성과 수학","확률·통계는 불확실한 상황의 최선 결정 도구. 완벽한 예측이 아니라, 가능한 결과의 구조를 이해하고 합리적으로 행동하는 것."],
      ["공식 암기보다 이해가 중요한 이유","공식은 맥락이 바뀌면 적용 불가. 원리를 이해하면 새 문제에 스스로 공식을 유도할 수 있다."],
      ["수학의 아름다움","간결한 공식이 복잡한 현상을 설명할 때, 예상치 못한 분야 간 연결이 드러날 때 느끼는 지적 쾌감."],
      ["직관과 엄밀함의 관계","직관은 탐험의 나침반, 엄밀한 증명은 지도 그리기. 둘 다 필수적이며, 어느 한쪽만으로는 수학이 완성되지 않는다."],
      ["대칭이 수학·물리에서 중요한 이유","대칭은 보존법칙과 직결(뇌터 정리). 물리학의 근본 법칙은 특정 대칭의 표현이며, 군론이 이를 기술한다."],
      ["수론의 현실 응용","RSA 암호(온라인 결제), 해시 함수(블록체인), 오류 정정 코드(통신). 추상 수학이 정보사회 인프라가 된 사례."],
      ["무한의 혁명적 개념","칸토어: 무한에도 크기가 다르다(자연수<실수). 직관을 넘어서는 논리적 발견의 전형."],
      ["수학적 모델링이란?","현실→수학 언어 번역→분석→현실 해석. 모든 가정을 명확히 하고 한계를 인식하는 것이 핵심."],
      ["수학과 예술의 공통점","패턴의 발견과 창조, 구조적 아름다움 추구, 추상적 세계의 탐험. 인간 창의성의 서로 다른 표현."],
      ["확률적 사고의 중요성","인간은 직관적으로 확률을 잘못 판단(도박사의 오류 등). 수학적 확률 사고가 편향 극복의 도구."],
      ["2026년 수학이 필요한 분야","AI/ML(선형대수, 확률론), 양자컴퓨팅, 기후모델링, 바이오인포매틱스, 금융공학 등 거의 모든 첨단 분야."],
      ["수학과 과학의 관계","수학은 과학의 언어이자 도구. '자연은 수학의 언어로 쓰여 있다'(갈릴레오)."],
      ["괴델의 불완전성 정리","충분히 강력한 수학 체계에는 참이지만 증명할 수 없는 명제가 반드시 존재한다는 혁명적 결과."],
      ["미해결 문제에 집착하는 이유","현재 수학 도구의 한계를 보여주며, 새 이론 개발의 동기. 리만 가설, P≠NP 문제 등."],
      ["산술기하학이란?","정수론과 대수기하학의 교차 분야. 방정식의 정수 해를 기하학적 관점에서 연구. 김민형 교수의 전공 분야."],
      ["이 책의 한계","수학의 아름다움을 강조하나 학습의 현실적 어려움(계산 훈련)을 다소 경시. 수학적 사고의 한계(가치 판단 영역)에 대한 논의 부족."],
      ["후속 탐구 주제","① 괴델 불완전성 정리의 철학적 함의 ② AI와 수학 증명 ③ 한국 수학의 역사 ④ 수학과 철학의 관계"]
    ]
  },
  {
    id:3, title:"파인만 씨 농담도 잘하시네", author:"리처드 파인만", field:"물리",
    bio:"20세기 최고 물리학자 중 한 명. QED 기여로 1965년 노벨 물리학상. MIT 졸업, 프린스턴 박사. 맨해튼 프로젝트 참여. Caltech 교수 역임.",
    episodes:["맨해튼 프로젝트 당시 금고 따기 취미로 보안 담당자들을 당혹시켰다.","챌린저호 사고 조사위에서 O-링을 얼음물에 담그는 간단한 실험으로 원인을 규명했다.","봉고 드럼, 마야 문자 해독 등 다양한 분야에 대한 끝없는 호기심으로 유명했다."],
    keys:["진정한 과학 정신은 끊임없는 호기심과 '모른다'고 말하는 정직함.","권위가 아니라 자연 자체에서 답을 찾아야 한다.","과학은 재미있어야 하며, 재미가 곧 창의성의 원천이다.","복잡한 것을 단순하게 설명 못하면 아직 이해하지 못한 것이다."],
    tpl:"리처드 파인만의 《파인만 씨 농담도 잘하시네》는 노벨상 물리학자의 유쾌한 삶을 통해 [과학적 태도의 본질]을 보여준다. [인상 깊은 에피소드]에서 [깨달음]을 얻었다. 핵심 메시지인 [핵심]은 과학고 학생으로서 [학업 태도 연결]이 됐다. [비판적 관점]은 현대 과학교육에 [시사점]을 제공한다. [종합 감상과 후속 탐구 방향]으로 마무리한다.",
    cards:[
      ["파인만의 과학적 태도 핵심","① 끝없는 호기심 ② '모른다'는 솔직함 ③ 권위가 아닌 실험으로 검증 ④ 재미와 놀이를 통한 창의적 사고"],
      ["파인만 다이어그램이란?","입자 간 상호작용을 시각화한 그림. 복잡한 QED 계산을 직관적으로 표현. 단순함이 혁신을 만든 대표 사례."],
      ["카고 컬트 과학이란?","과학의 형식은 갖추었지만 핵심 정신(정직, 자기비판, 재현성)이 없는 유사과학. Caltech 졸업식 연설에서 경고."],
      ["파인만의 학습법","① 12살 아이에게 설명해보기 ② 막히는 부분이 진짜 모르는 부분 ③ 교과서 덮고 스스로 유도 ④ 유추로 직관 구축"],
      ["재미를 잃었다 되찾은 계기","노벨상 후 부담에 재미를 잃었다가, 구내식당 접시 회전을 보고 순수한 호기심으로 문제를 풀며 회복. 이 놀이가 노벨상 연구의 시작."],
      ["챌린저호 조사의 교훈","복잡한 관료적 보고서 대신 O-링+얼음물의 단순 실험으로 원인 증명. 직관적 접근이 복잡한 시스템 문제를 드러낼 수 있다."],
      ["맨해튼 프로젝트의 교훈","과학의 파괴적 결과를 직접 목도. 과학자의 사회적 책임과 과학의 양면성 인식."],
      ["브라질 교육 비판","학생들이 공식을 완벽히 암기하나 실제 물리 현상을 설명 못함. '이름만 아는 것 vs 이해'의 차이를 강조한 유명 일화."],
      ["양자전기역학(QED)이란?","빛과 물질의 상호작용을 양자역학적으로 설명. 이론과 실험 오차 10^-12 수준인 가장 정확한 물리 이론."],
      ["경로적분 방법","입자가 A→B로 갈 때 가능한 모든 경로를 동시에 고려하여 확률 계산. 최소작용원리를 양자역학으로 일반화한 혁신."],
      ["나노기술 선구 발언","1959년 'Plenty of Room at the Bottom' 강연에서 원자 수준 조작 가능성 예측. 나노기술·양자컴퓨팅 비전을 30년 앞서 제시."],
      ["과학적 무지의 가치","'과학은 모든 것을 아는 게 아니라 무엇을 모르는지 아는 것.' 이 건전한 무지가 새 발견의 동기."],
      ["파인만과 현대 AI","양자 시뮬레이션의 필요성을 최초 제기(1981). 양자컴퓨팅 연구의 직접적 동기이며 2026년 양자AI 연구의 철학적 기반."],
      ["예술과 과학의 관계","봉고 드럼·그림 등 예술 활동이 창의적 사고를 자극. 파인만 다이어그램의 시각적 직관도 예술적 감각에서 비롯."],
      ["실패 대처법","첫 아내 사망, 도덕적 갈등, 연구의 벽을 겪으면서도 호기심과 유머 유지. 어려움을 '풀어야 할 문제'로 재정의하는 태도."],
      ["권위에 대한 태도","'중요한 것은 누가 말했냐가 아니라 실험이 뭘 보여주느냐이다.' 아인슈타인이든 자연이 다르면 틀린 것."],
      ["교육 철학의 현대적 시사점","암기 중심 비판, 본질적 이해 강조. 2026년 탐구·과정 중심 교육과정과 맞닿아 있다."],
      ["과학적 방법론의 핵심 명언","'아무리 아름다운 추측이라도 실험과 맞지 않으면 틀린 것이다.' 과학의 자기수정 메커니즘."],
      ["과학고 학생이 배울 핵심","성적·입시를 넘어 과학을 '즐기는 태도'가 궁극적으로 최고 성과로 이어진다는 것."],
      ["후속 탐구 주제","① QED 기초 ② 과학자의 사회적 책임 ③ 과학적 방법론 철학(포퍼, 쿤) ④ 과학 커뮤니케이션"]
    ]
  },
  {
    id:4, title:"엘러건트 유니버스", author:"브라이언 그린", field:"물리",
    bio:"컬럼비아대 물리학·수학과 교수. 하버드 졸업, 옥스퍼드 로즈 장학생 박사. 초끈이론 세계적 권위자. 월드 사이언스 페스티벌 공동 창립.",
    episodes:["초등학교 때 대학생 형에게 수학 과제를 검사받으며 흥미를 키웠다.","PBS 다큐 '엘러건트 유니버스' 직접 진행, 11차원 우주를 시각적으로 전달.","월드 사이언스 페스티벌을 통해 과학과 예술의 융합을 추구 중."],
    keys:["초끈이론은 네 가지 기본 힘을 통합할 유력한 후보이다.","우주의 근본은 점 입자가 아니라 진동하는 끈일 수 있다.","숨겨진 여분 차원이 관측되는 물리 현상을 설명할 수 있다.","물리학의 역사는 더 깊은 통합을 향한 여정이다."],
    tpl:"브라이언 그린의 《엘러건트 유니버스》는 초끈이론을 대중적으로 풀어낸 역작이다. [흥미로운 개념]에서 [이해와 감상]을 얻었다. [핵심 메시지]는 [과학적 탐구의 본질]과 연결된다. [비판적 관점: 검증 가능성 등]도 고려하며, [물리학적 시각 변화와 후속 탐구]로 마무리한다.",
    cards:[
      ["초끈이론의 기본 아이디어","물질의 최소 단위가 0차원 점이 아닌 1차원 끈. 끈의 다양한 진동 모드가 서로 다른 입자로 나타난다."],
      ["왜 통합이론을 추구하는가?","뉴턴, 맥스웰, 와인버그-살람처럼 다른 현상이 하나의 원리로 설명될 때마다 물리학이 도약했기 때문."],
      ["상대론과 양자역학의 충돌","두 이론을 동시에 적용하면 무한대 발생. 블랙홀 중심, 빅뱅 직후 등에서 두 이론이 모두 필요."],
      ["여분 차원이란?","초끈이론이 성립하려면 10~11차원 필요. 나머지 차원은 극도로 작게 말려있어(칼라비-야우 다양체) 관측 불가."],
      ["M이론이란?","5가지 초끈이론이 하나의 11차원 이론의 서로 다른 측면이라는 위튼의 제안(1995)."],
      ["가장 큰 비판: 검증 불가능성","끈 크기(플랑크 길이 ~10^-35m)가 너무 작아 직접 관측 불가. '과학인가 수학인가'라는 질문 제기."],
      ["끈이론과 블랙홀 엔트로피","스트로밍거·바파가 초끈이론으로 특정 블랙홀 엔트로피를 미시적으로 유도. 가장 인상적 성과 중 하나."],
      ["홀로그래피 원리(AdS/CFT)","중력이 있는 공간의 물리가 경계면의 양자장이론으로 완전히 기술된다는 말다세나의 결과(1997)."],
      ["표준모형이란?","전자기력·약력·강력과 물질 입자를 기술하는 현재 최고 이론. 중력 미포함, 암흑물질 설명 불가 등의 한계."],
      ["초대칭이란?","모든 입자에 짝이 되는 초대칭 파트너 존재 가설. LHC에서 아직 미발견으로 긴장 상태."],
      ["다중우주 가설","~10^500가지 칼라비-야우 형태가 각각 다른 물리 법칙의 우주에 대응. 과학적 검증 가능성 논쟁."],
      ["특수상대성이론 핵심","① 물리 법칙은 모든 관성계에서 동일 ② 빛의 속도는 일정. 시간 팽창, E=mc² 도출."],
      ["일반상대성이론의 중력 설명","중력은 힘이 아니라 시공간의 곡률. 질량이 시공간을 휘게 하고, 물체는 측지선을 따라 움직인다."],
      ["플랑크 스케일","양자중력이 중요해지는 극한. 플랑크 길이(~10^-35m), 시간(~10^-44s). 시공간 자체가 양자적으로 요동."],
      ["끈이론과 양자컴퓨팅","위상적 양자장이론이 양자컴퓨팅 오류정정에 응용. 위상적 큐빗은 끈이론에서 영감."],
      ["2026년 초끈이론 현황","직접 검증 미달이나, 수학적 도구로서의 가치(AdS/CFT)와 양자정보이론 접점이 활발히 연구 중."],
      ["대통일이론과 초끈이론","GUT는 전자기·약·강력 통합 목표. 초끈이론은 중력까지 포함한 만물의 이론(TOE) 추구."],
      ["위그너의 '비합리적 유효성'","수학이 물리 세계를 이렇게 잘 기술하는 것이 놀랍고 설명이 필요하다는 철학적 문제."],
      ["과학고 학생이 얻을 것","① 현대 물리 최전선 이해 ② 수학+물리 융합 사고 ③ 미해결 문제 흥미 ④ 이론적 아름다움의 가치"],

      ["슈뢰딩거의 고양이","양자 중첩을 거시세계에 적용하면 고양이가 살아있고 동시에 죽어있는 상태가 되는 역설. 관측 문제 제기."],
      ["양자생물학의 사례","광합성 양자 코히어런스, 조류 자기장 감지(양자 나침반), 효소 반응 양자 터널링, 후각 메커니즘."],
      ["정보와 엔트로피","정보는 물리적 실재. 정보 삭제는 열 방출 수반(란다우어 원리). 맥스웰의 도깨비 사고실험이 증명."],
      ["열역학 제2법칙","고립 시스템의 엔트로피는 항상 증가/유지. 자연이 질서→무질서로 향하는 경향. 시간의 방향성과 연결."],
      ["생명의 정의가 어려운 이유","바이러스(자가복제하나 세포 없음), 프리온(단백질 '복제'), AI(정보처리하나 물질대사 없음) 등 경계 사례."],
      ["자기조직화란?","외부 설계 없이 내부 상호작용으로 질서 자발 생성. 눈송이, 대류 세포, 생물 발생 등이 예."],
      ["프리고진의 산일 구조","비평형 상태에서 질서 자발 생성 가능. 슈뢰딩거의 네겐트로피를 수학적으로 발전."],
      ["합성생물학과의 연결","'생명이란 무엇인가'를 역접근: 최소 유전체로 생명을 만들 수 있는가? 벤터의 인공세포가 도전 중."],
      ["환원주의와 창발","환원: 기본 구성요소로 분해 이해. 창발: 상호작용에서 새 성질 출현. 생명은 둘 다 필요."],
      ["2026년 양자생물학 최신","광합성 양자효과, 효소 터널링, 후각 양자설 등이 활발히 연구. 물리-생물 융합의 최전선."],
      ["생명의 기원과 열역학","무생물→생물 전환이 열역학적으로 어떻게 가능한가? 네겐트로피 개념이 생명 기원 연구 출발점."],
      ["RNA 세계 가설","DNA와 단백질 이전에 RNA가 유전정보 저장과 화학반응 촉매를 동시에 수행했다는 가설."],

      ["후속 탐구 주제","① 양자생물학 ② 생명 기원(RNA 세계) ③ 합성생물학·윤리 ④ 복잡계·자기조직화 ⑤ 란다우어 원리"]

  {
    id:8, title:"과학혁명의 구조", author:"토마스 쿤", field:"과학사/철학",

    keys:["과학은 점진적 축적이 아닌 패러다임 전환(혁명)으로 발전한다.","정상과학은 기존 패러다임 내 퍼즐 풀기이며, 이상현상 축적이 위기와 혁명 촉발.","서로 다른 패러다임은 공약 불가능하여 단순 비교 어렵다.","과학적 진보에는 사회·심리적 요인이 순수 논리 못지않게 중요하다."],
    tpl:"토마스 쿤의 《과학혁명의 구조》는 과학 발전 방식에 대한 [기존 인식을 뒤흔든다]. [패러다임/정상과학/혁명 등]에서 [깨달음]을 얻었다. [과학의 사회적 성격 해석]이며 [현대 과학 사례 연결]이 가능하다. [상대주의 비판 등]도 고려하며 [과학관 변화]를 서술한다.",
    cards:[
      ["패러다임이란?","과학자 공동체가 공유하는 이론적 틀·방법론·가치관·표준 예시의 총체. 무엇이 정당한 문제인지 규정."],

      ["과학혁명의 과정","정상과학→이상현상 축적→위기→새 패러다임 제시→전환(혁명). 코페르니쿠스, 뉴턴, 아인슈타인이 사례."],
      ["공약 불가능성","다른 패러다임은 세계를 다르게 보기에 동일 기준으로 비교 불가. 뉴턴역학과 상대론에서 '질량'의 의미가 다른 것처럼."],

      ["이상현상의 역할","패러다임으로 설명 불가한 관찰. 처음엔 무시/조정되나 축적되면 위기 촉발. 수성 근일점 이동이 뉴턴역학의 이상현상."],
      ["과학자 공동체의 사회학적 역할","패러다임 선택은 논리+세대 교체, 교육, 심미적 판단, 사회적 합의에 의해 결정. '과학은 장례식마다 진보한다.'"],
      ["게슈탈트 전환과 과학혁명","오리-토끼 그림처럼 같은 데이터도 패러다임에 따라 다르게 해석. 세계관의 전체적 전환."],
      ["과학 교육에 주는 시사점","교과서는 정상과학의 완성된 결과만 제시→과학이 점진적으로 보임. 실제 과학은 논쟁·갈등·혁명의 과정."],
      ["과학적 상대주의 비판","쿤이 '모든 패러다임 동등'이라는 상대주의로 귀결된다는 비판. 쿤 본인은 부정, 후속 패러다임이 '더 나은 퍼즐 풀기 능력'이라 답변."],
      ["2026년 패러다임 전환 사례","① AI가 과학 방법론 변화 ② 양자컴퓨팅 계산 패러다임 전환 ③ 후성유전학 중심원리 수정 ④ 기후과학이 경제학 도전"],
      ["라카토슈의 연구 프로그램","비합리적 혁명 모델 비판, 경쟁 연구 프로그램들의 점진적 평가(진보적 vs 퇴행적) 제안."],

      ["과학 외 분야 영향","'패러다임 전환'이 경영(혁신), 교육, 사회과학, 예술 등의 변화 설명하는 보편 개념이 됨."],
      ["과학의 진보는 진리 수렴인가?","쿤은 회의적. 퍼즐 풀기 능력 향상으로 봄. 과학적 실재론 vs 도구주의 논쟁의 핵심."],
      ["통상적 역사관 vs 쿤","통상적: 오류 제거하며 진리 향해 축적. 쿤: 패러다임 내 축적과 패러다임 간 단절의 반복."],

      ["과학고 학생 핵심 교훈","① 과학은 완결된 진리가 아닌 진행 중 탐구 ② 비판적 사고와 건전한 의심 ③ 사회적 맥락 ④ 융합의 혁명적 잠재력"],
      ["후속 탐구 주제","① 포퍼 반증주의 ② 파이어아벤트 '방법에 반대한다' ③ 과학사회학 ④ 실재론 논쟁 ⑤ AI 시대 과학방법론"]

  {
    id:9, title:"코스모스", author:"칼 세이건", field:"융합",
    bio:"미국 천문학자·행성과학자·과학 커뮤니케이터. 코넬대 교수. NASA 행성탐사 프로그램 참여. TV '코스모스'로 과학 대중화 혁명.",
    episodes:["보이저 1호에 '창백한 푸른 점' 사진을 찍도록 NASA를 설득. 이 사진에 대한 에세이가 과학사 명문.","보이저 골든 레코드 내용 선정 위원장으로 지구 문명 메시지 기획.","핵겨울 이론 대중화와 핵무기 감축 운동에 적극 참여."],
    keys:["우주적 관점에서 인류 문제들은 겸손과 협력을 요구한다.","과학적 사고는 미신과 독단에 맞서는 자유의 도구이다.","우주를 이해하려는 노력은 자기 자신을 이해하는 것이다.","회의주의와 경이감의 균형이 건강한 과학적 태도이다."],
    tpl:"칼 세이건의 《코스모스》는 우주의 장대한 이야기로 [과학과 인간의 관계]를 탐구한다. [인상 깊은 장면]에서 [감상과 깨달음]을 얻었다. '별의 먼지' 메시지는 [본인 세계관 영향]. [비판적 시각]과 함께 [과학적 태도 결론]을 서술한다.",
    cards:[
      ["'별의 먼지'의 과학적 의미","빅뱅 후 수소·헬륨만 존재. 탄소·산소·철 등은 별 핵융합과 초신성으로 생성. 우리 몸의 원자는 문자 그대로 별에서 왔다."],
      ["우주 달력","138억년 역사를 1년으로 압축. 빅뱅=1월1일, 태양계=9월, 인류=12월31일 23:52. 문명은 마지막 몇 초."],
      ["창백한 푸른 점","보이저 1호가 60억km 밖에서 촬영한 지구. 작은 점에서 모든 역사가 펼쳐졌다는 사실이 겸손과 보호 필요성을 깨닫게 한다."],
      ["에라토스테네스의 교훈","BC 3세기에 그림자 각도 차이만으로 지구 둘레를 정밀 계산. 관찰과 논리만으로 놀라운 발견이 가능한 과학적 사고의 힘."],
      ["드레이크 방정식","우리 은하에 교신 가능 문명 수 추정. 별 형성률×행성 확률×생명 확률×지적 생명 확률 등의 인자를 곱한다."],
      ["회의주의와 경이감의 균형","경이감만→미신. 회의주의만→발견 동기 상실. 신비에 감탄하면서 증거를 엄밀히 검증하는 균형이 핵심."],
      ["특별한 주장은 특별한 증거를 요구","모든 것을 의심하는 것이 아니라, 증거에 비례하여 믿음의 강도를 조절하는 합리적 태도."],
      ["알렉산드리아 도서관 파괴의 교훈","반지성주의와 무관심이 문명을 후퇴시킬 수 있음을 경고. 현대의 과학 경시 풍조에 대한 경고."],
      ["보이저 골든 레코드","지구 소리(파도, 음악), 55개 언어 인사말, 115장 이미지, 과학 정보. 외계 지적 생명에게 보내는 '우주의 편지'."],
      ["핵겨울 이론","핵전쟁 시 먼지·그을음이 대기 뒤덮어 태양빛 차단→전 지구적 기온 하강. 세이건이 대중화."],
      ["페르미 역설","우주 크기·나이를 고려하면 외계 문명이 많아야 하는데 증거 없음. 대여과기, 동물원 가설, 문명 자멸 등 설명."],
      ["과학 커뮤니케이션의 중요성","민주주의에서 시민이 과학 이해 못하면 기술 정책 합리적 판단 불가. 대중화는 민주주의 건강의 필수 조건."],
      ["빅뱅의 증거 3가지","① 허블의 적색편이(우주 팽창) ② 우주 마이크로파 배경복사(CMB) ③ 가벼운 원소 존재비와 핵합성 이론 일치"],
      ["진화의 4단계(우주적)","① 물리적(빅뱅→별·은하) ② 화학적(원소→분자) ③ 생물학적(생명→다세포) ④ 문화적(도구, 언어, 과학)"],
      ["차고 안의 용 비유","보이지 않는·무형의·감지 불가능한 용은 없는 것과 구별 불가. 검증 불가 주장은 의미 있는 주장이 아님."],
      ["2026년 우주탐사 현황","JWST 외계행성 대기 분석, 아르테미스 달 탐사, SpaceX 화성 프로젝트, DART 소행성 방어 등이 세이건 비전 실현 중."],
      ["케플러와 뉴턴의 의미","미신·점성술에서 수학·물리학으로의 전환. 과학혁명의 핵심."],
      ["우주와 겸손","지구가 우주에서 작은 점이라는 인식이 인종·국가 간 갈등의 무의미함과 지구 보호의 필요성을 깨닫게 한다."],

report:"하이젠베르크의 《부분과 전체》는 양자역학 탄생의 핵심 인물이 자신의 지적 여정과 동료 과학자들과의 대화를 통해 물리학의 혁명적 전환을 생생히 전하는 자전적 에세이이다. 이 책의 가장 큰 가치는 위대한 과학 발견이 고독한 천재의 번뜩임이 아닌 깊은 대화와 논쟁에서 비롯됨을 보여주는 것이다. 보어와의 토론에서 양자역학의 해석이 구체화되고, 아인슈타인과의 논쟁에서 이론이 정제되는 과정은 과학이 본질적으로 사회적 활동임을 증명한다. 불확정성 원리의 발견 과정도 흥미롭다. 관측 가능한 양에만 집중하자는 아이디어가 꽃가루 알레르기로 요양하던 헬골란트 섬에서 탄생했다는 일화는 일상에서 벗어난 환경이 창의성을 자극할 수 있음을 보여준다. 그러나 이 책에서 가장 무겁게 다가온 것은 나치 시대 하이젠베르크의 선택이다. 과학적 능력과 도덕적 판단의 괴리는 과학자의 사회적 책임이라는 영원한 질문을 남긴다. 다만 이 회고록이 자기변호적 측면이 있다는 비판도 고려해야 한다. 양자컴퓨팅이 현실화되는 현재, 양자역학의 인간적 탄생 이야기는 더욱 의미 있다.",
cards:[
["불확정성 원리란?","위치와 운동량을 동시에 정확히 측정 불가(ΔxΔp≥ℏ/2). 측정 한계가 아닌 자연의 근본적 성격."],
["행렬역학이란?","1925년 창안. 관측 가능 물리량을 행렬로 표현. 슈뢰딩거 파동역학과 동등함이 증명됨."],
["코펜하겐 해석","보어·하이젠베르크 발전. 관측 전에는 확률만 존재, 관측이 상태를 결정한다는 입장."],
["보어와의 대화 의미","물리학 핵심 발전이 개인 천재성이 아닌 깊은 대화와 논쟁에서 비롯됨의 증거."],
["나치 핵무기 프로그램","과학적 능력과 도덕적 선택의 갈등. 의도적 지연 여부는 역사적 논쟁 대상."],
["부분과 전체의 의미","양자역학에서 부분의 합≠전체. 얽힘 상태에서 개별 입자는 독립적 성질이 없다."],
["양자역학의 철학적 함의","결정론 포기, 관측자 역할, 실재의 본질. 물리학이 철학 영역으로 확장."],
["아인슈타인-보어 논쟁","아인슈타인: 신은 주사위를 던지지 않는다. 보어: 신에게 지시하지 말라. 양자역학 완전성 논쟁."],
["젊은 물리학자들의 혁명","1920년대 20대 물리학자들이 고전물리학 전복. 기존 체계에 얽매이지 않는 젊은 사고의 힘."],
["양자 얽힘이란?","두 입자가 거리와 무관하게 상관관계. 아인슈타인이 유령같은 원거리 작용이라 비판했으나 실험으로 확인."],
["상보성 원리","보어: 파동성·입자성은 배타적이지만 모두 필요. 실험 설정에 따라 다른 측면이 드러남."],
["헬골란트 섬의 돌파구","꽃가루 알레르기로 요양 중 행렬역학 핵심 아이디어 획득. 일상 탈출이 창의성 자극한 사례."],
["대응원리","양자역학은 거시세계에서 고전역학으로 수렴. 혁명이되 연속성도 유지하는 물리학의 특성."],
["물리적 직관의 역할","수학 형식화 이전 물리적 직관이 발견의 출발점. 관측량에 집중하는 직관으로 행렬역학 창안."],
["다세계 해석","에버렛: 관측 시 우주가 분기. 파동함수 붕괴를 제거하는 급진적 대안."],
["2026년 양자역학 현재","양자컴퓨팅·양자통신·양자센싱 실용화 단계. 불확정성이 기술적 자원이 되는 역설적 전환."],
["과학자의 사회적 책임","하이젠베르크의 딜레마는 과학의 군사적 이용에 대한 영원한 윤리적 질문."],
["벨 부등식이란?","국소 실재론이 양자역학 예측과 양립 불가함을 보이는 수학적 부등식. 실험으로 양자역학의 승리 확인."],
["이 책의 한계","자기변호적 서술 비판. 동료 과학자 시각 부재. 나치 시대 행적의 객관적 평가 부족."],
["후속 탐구","① 양자역학 수학적 기초 ② 벨 부등식 실험 ③ 양자컴퓨팅 ④ 과학자 윤리 ⑤ 다세계 해석"]
]},
{id:16,title:"시간의 역사",author:"스티븐 호킹",field:"물리",
bio:"영국 이론물리학자. 케임브리지대 루카스 석좌교수. 블랙홀 복사 예측. ALS를 극복하며 과학 대중화에 헌신.",
episodes:["21세에 ALS 진단, 수명 2년을 50년 이상 극복하며 연구를 이어간 전설적 삶.","전 세계 1천만 부 이상 판매, 과학 대중서 역사상 가장 성공적인 책 중 하나.","음성 합성기를 통한 독특한 소통이 장애와 과학의 관계에 대한 인식을 바꿈."],
keys:["시간과 공간은 물질·에너지에 의해 휘어지는 역동적 실체이다.","블랙홀은 복사를 방출한다(호킹 복사).","우주 이해에 양자역학과 일반상대론의 통합이 필수적이다.","과학은 '왜 유가 존재하는가'라는 궁극적 질문에 다가가고 있다."],
report:"스티븐 호킹의 《시간의 역사》는 우주의 기원과 시간의 본질에 대한 현대 물리학의 최전선을 수식 하나 없이 대중에게 전달하려는 대담한 시도이다. 블랙홀이 양자 효과에 의해 복사를 방출하고 결국 증발한다는 호킹 복사의 발견은, 양자역학과 일반상대론이 결합할 때 나타나는 놀라운 결과를 보여준다. 시간의 화살 문제도 인상적이다. 왜 시간은 한 방향으로만 흐르는가라는 질문에 대해 열역학적, 심리적, 우주론적 세 가지 화살이 같은 방향을 가리킨다는 설명은 물리학의 깊이를 느끼게 한다. 호킹의 무경계 가설, 즉 우주는 시간적 시작점이 없는 닫힌 구조라는 제안은 빅뱅 이전이라는 개념 자체를 무의미하게 만드는 대담한 사고이다. 또한 블랙홀 정보 역설은 양자역학의 정보 보존과 일반상대론의 예측이 충돌하는 현대 물리학 최대의 미해결 문제임을 알게 되었다. 다만 출간이 1988년이라 힉스 입자 발견이나 중력파 관측 등 이후의 발전이 반영되지 않은 한계가 있다. ALS를 극복하며 우주의 비밀을 파헤친 호킹의 삶 자체가 인간 정신의 무한한 가능성을 증명한다.",
cards:[
["호킹 복사란?","블랙홀이 양자 효과로 복사를 방출, 결국 증발(1974). 양자역학+일반상대론 결합의 최초 중요 결과."],
["블랙홀 정보 역설","블랙홀 증발 시 정보는 어디로? 양자역학 정보보존 vs 상대론 예측 충돌. 현대 최대 미해결 문제."],
["빅뱅 특이점","우주 시작점. 밀도·온도 무한대, 상대론 붕괴. 양자중력이론 필요."],
["시간의 화살","왜 시간은 한 방향? 열역학적(엔트로피), 심리적(기억), 우주론적(팽창) 세 화살이 같은 방향."],
["특이점 정리","호킹-펜로즈: 상대론에서 특이점 존재가 불가피. 빅뱅과 블랙홀 모두 적용."],
["빛원뿔이란?","시공간에서 빛이 이동 가능한 영역. 인과관계와 사건의 순서를 결정하는 기하학적 구조."],
["무경계 가설","호킹: 우주는 시간적 시작점이 없는 닫힌 구조. '빅뱅 이전'이라는 개념을 무의미하게 만듦."],
["양자중력이란?","양자역학+상대론 통합 시도. 초끈이론, 루프양자중력 등이 후보. 아직 미완성."],
["인류 원리","물리 상수가 생명 존재에 적합하게 미세 조정된 현상. 관측자 존재 가능 우주만 관측된다는 설명."],
["우주 팽창 발견","허블이 적색편이 관측, 우주 팽창 발견(1929). 정적 우주관의 종말."],
["암흑에너지란?","우주 팽창 가속 에너지. 우주 에너지 68% 차지하나 본질은 미해결."],
["웜홀과 시간여행","상대론이 허용하는 시공간 지름길. 이론적으로 시간여행 가능하나 물리적 실현은 극난."],
["우주배경복사(CMB)","빅뱅 38만 년 후의 빛. 초기 우주의 스냅샷. COBE·WMAP·Planck 정밀 측정."],
["만물의 이론(TOE)","모든 물리법칙을 하나로 통합하려는 궁극 목표. 호킹은 가능하다고 낙관."],
["호킹의 장애 극복","물리적 제약 속 지적 탐구 포기 않은 삶. 인간 정신의 무한한 가능성 증명."],
["2026년 블랙홀 관측","EHT 블랙홀 촬영(2019). JWST가 초기 우주 블랙홀 연구 중. 이론과 관측의 만남."],
["중력파 발견","LIGO 2015년 최초 관측. 블랙홀 합병에서 방출된 시공간의 물결. 아인슈타인의 마지막 예측 확인."],
["이 책의 한계","1988년 출간 이후 발전(힉스, 중력파) 미반영. 수학 설명 과도 생략의 대중서 한계."],
["과학고 학생 교훈","① 거시-미시 통합 비전 ② 끊임없는 질문 ③ 한계 극복 정신 ④ 직관적 물리 이해"],
["후속 탐구","① 상대론 기초 ② 양자중력 ③ 블랙홀 열역학 ④ 인플레이션 우주론 ⑤ 중력파 물리학"]
]},
{id:17,title:"주기율표",author:"프리모 레비",field:"화학",
bio:"이탈리아 화학자·작가. 아우슈비츠 생존자. 화학과 문학을 결합한 독보적 저술 세계를 구축. 20세기 가장 중요한 이탈리아 작가 중 한 명.",
episodes:["아우슈비츠 수용소에서 화학 지식 덕분에 생존. 실험실 보조로 배치되어 혹한을 피할 수 있었다.","《이것이 인간인가》로 홀로코스트 문학의 대표 작품을 남겼다.","각 장을 원소 이름으로 명명하여 화학과 삶의 유비를 탐구하는 독특한 자전적 구조를 창안."],
keys:["화학은 삶의 경험과 분리할 수 없는 인간적 학문이다.","물질을 이해하는 것은 세계와 자기 자신을 이해하는 것이다.","극한 상황에서도 지식과 이성은 인간의 존엄을 지키는 도구가 된다.","원소의 성질은 인간의 다양한 성격과 삶의 국면을 비유한다."],
report:"프리모 레비의 《주기율표》는 주기율표의 원소를 장(章) 제목으로 삼아 자전적 경험을 화학의 언어로 풀어낸 독보적인 작품이다. 아르곤으로 시작하여 유대인 선조의 비활성 기체 같은 고립된 삶을 묘사하고, 아우슈비츠에서의 생존 경험을 세륨과 연결하며, 탄소로 생명의 순환을 추적하는 구조는 과학과 문학의 경계를 완전히 허문다. 가장 충격적이었던 것은 아우슈비츠에서 화학 지식이 문자 그대로 목숨을 구한 이야기이다. 실험실 보조로 배치되어 혹한을 피할 수 있었다는 사실은, 지식이 생존의 도구가 될 수 있음을 극단적으로 보여준다. 또한 전쟁 후 페인트 공장에서의 화학자 일상, 불순물과 싸우는 과정에서 느끼는 장인적 보람 등은 화학이 추상이 아닌 삶의 일부임을 실감하게 한다. 탄소 원자 하나가 수억 년에 걸쳐 석회암에서 포도주로, 공기에서 나뭇잎으로 여행하는 마지막 장은 과학적 상상력의 극치이다. 이 책은 과학이 인간의 경험, 역사, 윤리와 어떻게 얽혀 있는지를 보여주며, 과학고 학생에게 인문학적 감수성의 중요성을 일깨워준다.",
cards:[
["이 책의 독특한 구조","각 장이 원소 이름으로 명명. 원소의 화학적 성질과 자전적 경험을 유비적으로 연결하는 독창적 형식."],
["아르곤 장의 의미","비활성 기체 아르곤으로 유대인 선조들의 고립된 삶을 비유. 주변과 반응하지 않는 존재의 외로움과 독립성."],
["아우슈비츠와 화학","화학 지식이 수용소에서 생존의 도구. 실험실 배치로 혹한 피함. 지식이 생존을 결정하는 극단적 상황."],
["탄소 장의 의미","탄소 원자 하나의 수억 년 여행을 추적. 석회암→대기→나뭇잎→포도주→인간. 물질 순환의 장대한 이야기."],
["화학과 문학의 결합","레비는 화학의 정밀성과 문학의 감성을 결합하여 독보적 장르를 창조. 과학적 글쓰기의 새로운 가능성."],
["크롬 장의 의미","페인트 공장에서의 실용 화학. 불순물과 싸우는 장인적 과정에서 느끼는 화학자의 보람과 좌절."],
["철 장의 의미","친구 산드로와의 등산 경험. 철처럼 강인한 우정과 파시즘에 맞서는 저항 정신의 상징."],
["홀로코스트 문학의 의미","극한 상황에서 인간성을 기록하는 행위. 증언 문학은 역사적 진실을 보존하고 반복을 방지하는 도구."],
["레비의 화학관","물질을 이해하는 것은 세계를 이해하는 것. 화학은 추상이 아닌 손으로 만지는 구체적 학문."],
["불순물의 의미","레비는 불순물이 흥미로운 것이라고 말함. 완벽한 순수보다 불완전한 혼합에서 다양성과 생명이 탄생."],
["금 장의 의미","연금술사의 꿈과 화학의 현실 사이 간극. 허황된 목표 속에서 실제 화학 발견이 이루어진 역설."],
["니켈 장의 의미","광산에서의 연구. 자연에서 원소를 추출하는 과정이 세상과 관계 맺는 방법의 비유."],
["수소 장의 의미","학생 시절 첫 화학 실험. 수소의 폭발적 반응으로 화학에 대한 경외와 흥분을 동시에 경험."],
["아우슈비츠 이후의 글쓰기","증언의 의무와 생존자의 죄책감 사이 갈등. 레비는 글쓰기를 통해 경험을 의미화하려 했다."],
["화학과 윤리의 관계","화학 지식은 치유와 파괴 모두에 쓰일 수 있다. 과학자의 도덕적 판단이 중요한 이유."],
["물질과 정체성","레비에게 물질을 다루는 화학자의 정체성은 작가의 정체성과 분리 불가. 관찰과 분석이 양쪽 모두의 기본."],
["2026년 시점에서의 의미","과학과 인문학의 융합이 강조되는 현재, 레비의 통합적 시각은 더욱 귀중한 모범이 됨."],
["과학적 글쓰기의 가능성","정밀한 관찰+감성적 서술의 결합. 과학 커뮤니케이션의 이상적 모델."],
["이 책의 한계","자전적 기억의 선택적 서술. 화학 원리 자체의 심화 설명보다 비유와 은유에 치중하는 면."],
["후속 탐구","① 홀로코스트 역사·문학 ② 유기화학의 기초 ③ 과학과 문학의 융합 ④ 과학자의 윤리 ⑤ 물질문화사"]
]},
{id:18,title:"나폴레옹의 단추",author:"페니 르쿠터",field:"화학",
bio:"캐나다 화학자·과학저술가. 밴쿠버 카필라노대 화학 교수. 제이 버레슨과 공저. 화학 분자가 역사를 바꾼 사례를 추적하는 독특한 과학사를 집필.",
episodes:["나폴레옹 군복 주석 단추가 러시아 원정 실패의 한 원인이라는 가설에서 책 제목을 착안.","17개 분자의 이야기를 통해 화학이 세계사를 어떻게 바꿨는지 추적하는 독창적 구성을 창안.","화학 교수로서 학생들에게 분자의 인간적 이야기를 들려주는 교육법으로 호평받았다."],
keys:["개별 분자의 화학적 성질이 세계사의 흐름을 바꿀 수 있다.","향신료·의약품·폭발물 등의 분자가 탐험·전쟁·산업혁명을 촉발했다.","분자의 구조(특히 이성질체)가 전혀 다른 성질을 만들어 인류에 큰 영향을 미쳤다.","화학은 인간의 욕망, 권력, 호기심과 깊이 얽혀 있다."],
report:"페니 르쿠터의 《나폴레옹의 단추》은 17개 핵심 분자가 어떻게 세계 역사를 바꾸었는지를 추적하는 흥미로운 화학-역사 융합서이다. 책 제목은 나폴레옹 군복의 주석 단추가 러시아의 혹한에서 알파 주석에서 베타 주석으로 상전이하여 부서졌고, 이것이 병사들의 동사를 가속화하여 원정 실패의 한 원인이 되었다는 가설에서 유래한다. 분자의 화학적 성질 하나가 제국의 운명을 바꿀 수 있다는 이 이야기는 화학의 역사적 힘을 극적으로 보여준다. 가장 인상 깊었던 것은 향신료 분자들의 이야기이다. 후추의 피페린, 정향의 유제놀 등 작은 유기 분자가 대항해시대를 촉발하고 식민지 전쟁을 일으켰다는 사실은 화학과 지정학의 의외의 연결을 보여준다. 또한 아스피린, 페니실린 등 의약품 분자가 인류 수명을 혁명적으로 연장한 과정도 흥미롭다. 이성질체, 즉 같은 분자식이지만 구조가 다른 분자들이 전혀 다른 효과를 낸다는 설명은 분자 구조의 결정적 중요성을 깨닫게 해주었다. 화학이 단순한 실험실 학문이 아니라 문명의 원동력임을 실감하게 하는 책이다.",
cards:[
["나폴레옹 단추의 가설","주석 단추가 러시아 혹한에서 α→β 상전이로 부서짐→병사 동사 가속→원정 실패. 분자 성질이 역사를 바꾼 사례."],
["주석의 동소체 전이","주석은 13.2°C 이하에서 백색(β-Sn)→회색(α-Sn) 전이. '주석 페스트'라 불리며 단추·파이프 등을 부식."],
["향신료가 대항해시대를 촉발","후추(피페린), 정향(유제놀), 육두구(미리스티신) 등 소량의 유기분자가 막대한 부를 창출. 향신료 무역이 유럽의 세계 진출 동기."],
["이성질체의 중요성","같은 분자식이나 구조가 다르면 전혀 다른 성질. 탈리도마이드 사건이 대표적 비극적 사례."],
["아스코르브산(비타민C)의 역사","괴혈병이 수백만 선원 사망 원인. 감귤류의 아스코르브산이 해결. 분자 하나가 대항해 성공 좌우."],
["아스피린의 발견","버드나무 껍질의 살리실산→아세틸살리실산(아스피린). 가장 성공적 약물 중 하나의 화학 이야기."],
["니트로글리세린과 다이너마이트","폭발물의 화학. 노벨의 안전화 성공이 건설·채굴 혁명을 이끌었지만 전쟁 무기로도 사용."],
["인디고와 합성 염료","천연 인디고의 인공 합성(바이어)이 염료 산업 혁명을 일으키고 독일 화학 산업의 기초가 됨."],
["카페인·니코틴·모르핀","알칼로이드 분자들이 인류의 행동과 문화를 형성. 중독·전쟁·무역의 화학적 기반."],
["설탕(수크로스)과 노예 무역","설탕 분자에 대한 유럽의 수요가 카리브해 사탕수수 플랜테이션과 노예 무역을 촉진한 비극적 역사."],
["소금(NaCl)의 문명적 역할","보존제·화폐·전쟁 원인. '봉급(salary)'의 어원이 소금(sal). 화학적으로 단순한 분자의 거대한 역사적 영향."],
["올레산과 지방의 화학","불포화지방산 올레산이 올리브유의 건강 효과와 지중해 식문화의 화학적 기반."],
["폴리머(고분자)의 혁명","나일론·폴리에틸렌 등 합성 고분자가 20세기 물질문명을 근본적으로 변혁."],
["DDT와 환경 논쟁","말라리아 퇴치 공로와 생태계 파괴의 양면. 레이첼 카슨의 《침묵의 봄》과 연결."],
["경구 피임약의 화학","호르몬 분자의 합성이 여성 해방과 사회 변혁을 이끈 화학의 사회적 영향."],
["분자 모양이 맛을 결정","단맛(포도당), 매운맛(캡사이신), 감칠맛(글루탐산). 분자 구조가 미각 수용체와의 결합을 결정."],
["키랄성이란?","거울상 이성질체. 왼손-오른손처럼 겹칠 수 없는 분자 쌍. 생화학에서 극도로 중요(L-아미노산만 사용)."],
["2026년 화학의 역사적 영향","mRNA 백신, AI 신약 설계, 배터리 화학 등 분자 수준 혁신이 계속 세계를 바꾸는 중."],
["이 책의 한계","역사적 일화가 화학 원리 설명보다 우선. 일부 역사적 가설(나폴레옹 단추)의 검증 부족."],
["후속 탐구","① 유기화학 기초 ② 의약 화학사 ③ 이성질체와 키랄성 ④ 고분자 과학 ⑤ 식품 화학"]
]},
{id:19,title:"이중나선",author:"제임스 왓슨",field:"생물",
bio:"미국 분자생물학자. 크릭과 함께 DNA 이중나선 구조 발견(1953). 1962년 노벨 생리의학상. 콜드 스프링 하버 연구소장 역임.",
episodes:["25세에 DNA 구조를 발견하여 생물학 역사상 가장 중요한 발견 중 하나를 이루었다.","이 책은 과학 발견의 이면에 있는 경쟁, 질투, 정치를 솔직하게 드러내 논란을 일으켰다.","로잘린드 프랭클린의 X선 결정학 데이터 사용 과정에서의 윤리적 문제가 지속적으로 제기되어왔다."],
keys:["과학 발견은 논리적 추론만이 아니라 직관, 경쟁, 행운의 결합이다.","분자 구조가 생명의 비밀을 담고 있으며, 구조가 곧 기능이다.","과학의 이면에는 인간적 야망, 경쟁, 정치가 존재한다.","여성 과학자의 기여가 부당하게 무시될 수 있다(프랭클린 사례)."],
report:"제임스 왓슨의 《이중나선》은 DNA 구조 발견이라는 20세기 최대의 과학적 업적이 이루어진 과정을 당사자가 솔직하고도 논쟁적으로 기록한 과학 회고록이다. 이 책의 가장 큰 가치는 과학 발견의 교과서적 이미지를 깨뜨리는 것이다. 왓슨과 크릭의 발견 과정은 체계적 실험보다 모형 만들기와 직관적 추론에 의존했으며, 라이너스 폴링과의 치열한 경쟁 의식이 중요한 동기가 되었다. 그러나 이 책에서 가장 비판적으로 읽어야 할 부분은 로잘린드 프랭클린에 대한 서술이다. 프랭클린의 X선 결정학 사진 51번이 DNA 구조 규명의 결정적 단서였음에도 그녀의 기여가 충분히 인정받지 못한 것은 당시 과학계의 성차별을 보여준다. 또한 왓슨의 서술이 프랭클린에게 불공정하다는 비판이 지속적으로 제기되어왔다. 과학 발견의 인간적 측면과 함께 구조생물학의 핵심 원리, 즉 분자의 3차원 구조가 곧 기능을 결정한다는 통찰을 이해하게 되었다. 과학에서의 공정한 공로 인정과 다양성 존중이 왜 중요한지를 깨닫게 해준 책이다.",
cards:[
["DNA 이중나선 발견의 의미","생명의 유전정보가 이중나선 구조의 DNA에 저장됨을 규명(1953). 분자생물학의 탄생점. 현대 생명과학 전체의 기초."],
["사진 51번의 중요성","프랭클린이 촬영한 DNA의 X선 회절 사진. 나선 구조와 치수를 결정하는 데 핵심적 역할. 왓슨이 이 사진을 보고 구조를 확신."],
["로잘린드 프랭클린의 기여와 비극","X선 결정학으로 DNA 구조의 핵심 데이터 제공. 노벨상 수상 전 37세에 사망. 기여가 충분히 인정받지 못한 과학사의 비극."],
["왓슨-크릭 모형의 핵심","두 폴리뉴클레오티드 사슬이 역평행으로 감긴 이중나선. A-T, G-C 염기쌍의 상보성이 유전 정보 복제의 메커니즘."],
["샤가프의 규칙","DNA에서 A=T, G=C의 양이 같다는 발견. 이것이 상보적 염기쌍 개념의 핵심 단서가 됨."],
["모형 만들기 방법","왓슨과 크릭은 직접 실험하기보다 분자 모형을 조립하며 가능한 구조를 탐색. 이론적 모형 구축의 가치를 보여줌."],
["폴링과의 경쟁","노벨상 수상자 폴링이 DNA 구조 연구에 착수. 삼중나선이라는 오류를 범했고, 이 실수가 왓슨과 크릭에게 시간을 벌어줌."],
["X선 결정학이란?","결정에 X선을 쏘아 회절 패턴으로 분자 3차원 구조를 결정하는 기법. 생화학 최강의 구조 분석 도구."],
["중심원리(Central Dogma)","DNA→RNA→단백질의 유전정보 흐름. 크릭이 명명. 분자생물학의 기본 패러다임(역전사효소 등 예외 존재)."],
["과학에서 경쟁의 역할","경쟁이 발견을 촉진하지만 윤리적 문제도 야기. 왓슨-크릭 vs 폴링, 왓슨-크릭 vs 프랭클린-윌킨스의 관계."],
["과학에서 성차별","프랭클린의 사례가 보여주듯 여성 과학자의 기여가 부당하게 무시된 역사. 현재에도 진행 중인 문제."],
["DNA 복제 메커니즘","이중나선이 풀리고 각 가닥이 주형으로 새 가닥 합성. 상보적 염기쌍 원리로 정확한 복제 가능."],
["구조가 곧 기능","분자의 3차원 구조가 생물학적 기능을 결정한다는 구조생물학의 핵심 원리. 이중나선 구조가 복제를 가능케 함."],
["DNA 발견 이후의 발전","유전 코드 해독(1960s), PCR 기술(1983), 인간 게놈 프로젝트(2003), CRISPR(2012) 등 혁명의 연쇄."],
["2026년 DNA 기술의 현재","CRISPR 유전자 편집 치료 임상, 합성생물학, DNA 데이터 저장 등 왓슨과 크릭의 발견이 계속 확장 중."],
["과학 커뮤니케이션의 교훈","왓슨의 솔직한 서술이 과학의 인간적 면모를 드러냈지만, 편향된 시각의 위험도 보여줌."],
["모형 구축의 과학적 가치","이론적 모형→예측→실험 검증의 순환. 분자 구조 연구에서 물리적 모형의 효용성."],
["이 책의 논쟁점","프랭클린에 대한 불공정한 서술. 자기 과시적 톤. 크릭의 기여 과소평가 가능성. 과학의 어두운 면 미화 우려."],
["과학고 학생 교훈","① 구조=기능 원리 ② 융합적 접근(물리+화학+생물) ③ 과학 윤리 ④ 직관과 모형의 가치 ⑤ 공정한 공로 인정"],
["후속 탐구","① 분자생물학 기초 ② X선 결정학 원리 ③ CRISPR 기술 ④ 과학에서의 여성 ⑤ 구조생물학(AlphaFold)"]
]},
{id:20,title:"통섭",author:"에드워드 윌슨",field:"생물",
bio:"미국 생물학자·박물학자. 하버드대 교수. '사회생물학의 아버지'. 생물다양성 보전의 선구자. 퓰리처상 2회 수상.",
episodes:["개미 연구의 세계적 권위자로 출발하여 인간 행동의 생물학적 기반까지 연구 영역을 확장.","사회생물학 출간 후 학자들의 물세례를 받는 등 격렬한 반대에 직면했으나 소신을 굽히지 않았다.","2021년 92세로 타계할 때까지 지구 생물다양성 보전(반절 지구 프로젝트)에 헌신."],
keys:["자연과학·인문학·사회과학의 지식은 하나의 통합된 체계로 연결될 수 있다(통섭).","인간의 문화와 행동도 생물학적 진화의 산물이며 자연과학적으로 이해 가능하다.","학문 분야 간 경계는 인위적이며 진정한 지식은 통합에서 나온다.","생물다양성 보전은 인류 생존의 핵심 과제이다."],
report:"에드워드 윌슨의 《통섭》은 자연과학, 인문학, 사회과학의 지식이 하나의 통합된 체계로 연결될 수 있다는 대담한 비전을 제시한다. 윌슨은 계몽주의의 통합적 지식관을 현대 과학의 성과로 부활시키며, 물리학에서 생물학으로, 생물학에서 심리학으로, 심리학에서 사회과학으로 이어지는 지식의 연결 사슬을 제안한다. 가장 인상적이었던 것은 인간의 도덕 감정과 미적 판단까지도 진화적 적응의 산물일 수 있다는 주장이다. 윤리학이 순수한 철학이 아니라 진화생물학과 신경과학에 기반할 수 있다는 관점은 학문 간 경계에 대한 근본적 도전이다. 또한 환경윤리가 생태학적 지식에 기반해야 한다는 주장은 기후변화 시대에 특히 설득력이 있다. 그러나 통섭의 비전에 대해 비판적 시각도 필요하다. 자연과학으로 인문학을 환원하려는 시도가 인간 경험의 복잡성을 단순화한다는 비판과, 문화적 다양성을 생물학적으로 설명하려는 것이 결정론에 빠질 수 있다는 우려도 타당하다. 과학고 학생으로서 분야 간 경계를 넘나드는 융합적 사고의 가치와 위험을 동시에 배울 수 있었다.",
cards:[
["통섭이란?","'지식의 통합(consilience)'. 자연과학·인문학·사회과학의 지식이 하나의 일관된 체계로 연결된다는 비전. 윌리엄 휴얼이 만든 용어."],
["환원주의적 통합","물리학→화학→생물학→심리학→사회과학 순서로 상위 학문이 하위 학문의 법칙에 기반한다는 관점."],
["유전자-문화 공진화","유전자와 문화가 서로 영향을 주며 함께 진화한다는 이론. 유당 분해 능력과 목축 문화의 공진화가 예."],
["사회생물학이란?","사회적 행동의 생물학적 기반을 연구하는 학문. 윌슨이 1975년 창시. 격렬한 정치적·학문적 논쟁 촉발."],
["윤리학의 생물학적 기반","도덕 감정이 진화적 적응의 산물일 수 있다는 주장. 윤리학이 순수 철학이 아닌 자연과학적 토대를 가질 수 있음."],
["미적 판단의 진화적 기원","아름다움에 대한 선호가 생존과 번식에 유리한 환경(풍부한 자원 등)에 대한 진화적 반응일 수 있다는 가설."],
["학문 간 경계의 인위성","현대 학문 분과는 역사적 편의에 의한 것이며, 실제 세계의 현상은 분야를 넘나든다."],
["생물다양성 보전","윌슨의 핵심 관심사. 종의 멸종이 인류 생존에 직접적 위협. '반절 지구(Half-Earth)' 프로젝트 제안."],
["개미 연구에서 통섭까지","개미 사회의 복잡한 행동을 생물학적으로 분석한 경험이 인간 사회 행동 연구로 자연스럽게 확장."],
["마음의 생물학적 기반","의식, 감정, 의사결정이 뇌의 신경생물학적 과정에 기반한다는 관점. 자유의지 논쟁과 연결."],
["문화의 진화론적 이해","문화를 생물학적 진화의 연장선에서 이해하려는 시도. 밈 이론, 문화 진화학과 연결."],
["통섭에 대한 비판","① 인문학의 환원적 단순화 우려 ② 문화 다양성의 생물학적 결정론 ③ 가치와 사실의 혼동 ④ 학문적 제국주의."],
["과학과 종교의 관계","윌슨은 종교적 충동도 진화적 산물이라 봄. 과학과 종교가 양립 가능한지에 대한 근본 질문."],
["환경윤리의 과학적 기반","생태학적 지식 없는 환경 정책은 무모. 과학이 윤리적 판단의 사실적 기반을 제공해야 한다는 주장."],
["인간 본성 논쟁","인간 행동이 유전(nature)인가 환경(nurture)인가? 윌슨은 둘의 상호작용을 강조하되 유전적 기반을 중시."],
["2026년 통섭의 현실","AI가 학문 경계를 넘는 패턴 발견, 신경경제학·진화심리학 등 융합 학문 발전으로 통섭 비전이 부분적으로 실현."],
["과학고 교육과 통섭","분야별 분리 교육의 한계. 물리·화학·생물·수학의 연결고리를 찾는 것이 진정한 과학적 이해."],
["이 책의 한계","자연과학 편향, 인문학 경시 경향. 사회 구조적 요인 과소평가. 환원주의의 한계 인식 부족."],
["후속 탐구","① 사회생물학 ② 진화심리학 ③ 신경과학 기초 ④ 생물다양성 위기 ⑤ 과학-인문 융합"],
["반절 지구 프로젝트","지구 표면의 절반을 자연 보호구역으로 지정하여 생물다양성을 보전하자는 윌슨의 제안."]
]},
{id:21,title:"카오스",author:"제임스 글릭",field:"과학사/철학",
bio:"미국 과학저술가. 《뉴욕타임스》 기자 출신. 복잡계 과학을 대중에게 소개한 선구적 저작으로 퓰리처상 후보. 과학 대중서의 새 기준을 제시.",
episodes:["뉴욕타임스 과학기자로서 물리학자들의 비선형 역학 연구를 취재하다 이 책을 구상.","이 책의 성공으로 '카오스 이론'이 대중적 용어가 되었으며, 프랙탈·나비 효과 등이 일상어로 자리잡음.","과학 논픽션 장르의 스토리텔링 기준을 높인 작가로 평가받는다."],
keys:["결정론적 시스템도 예측 불가능한 행동(카오스)을 보일 수 있다.","초기 조건의 미세한 차이가 완전히 다른 결과를 만든다(나비 효과).","자연의 불규칙한 형태(해안선, 구름)는 프랙탈이라는 수학적 구조로 기술된다.","카오스와 질서는 대립이 아니라 자연에서 공존하는 원리이다."],
report:"제임스 글릭의 《카오스》는 결정론적 방정식에서 예측 불가능한 행동이 나타날 수 있다는 카오스 이론의 탄생을 추적하는 과학 논픽션의 고전이다. 뉴턴 이래 과학은 초기 조건을 알면 미래를 정확히 예측할 수 있다고 믿어왔다. 그러나 로렌츠가 기상 모델에서 소수점 이하 미세한 차이가 완전히 다른 날씨를 만드는 것을 발견하면서 이 확신이 무너졌다. 이것이 유명한 나비 효과이다. 가장 인상적이었던 것은 만델브로의 프랙탈 기하학이다. 해안선의 길이가 측정 자의 크기에 따라 달라진다는 관찰에서 시작하여, 자연의 불규칙한 형태를 기술하는 새로운 수학을 탄생시킨 과정은 관점의 전환이 가져오는 혁신을 보여준다. 또한 파이겐바움의 보편 상수가 전혀 다른 물리 시스템에서 동일하게 나타난다는 발견은 카오스 속에도 보편적 법칙이 존재함을 시사한다. 다만 이 책이 카오스 이론의 혁명성을 다소 과장한다는 비판도 있다. 기후 모델링과 AI 예측이 복잡계 과학에 의존하는 현재, 카오스 이론의 기본 개념을 이해하는 것은 과학고 학생에게 필수적이다.",
cards:[
["카오스 이론이란?","결정론적 시스템이 초기 조건에 극도로 민감하여 장기 예측이 불가능한 현상. 무작위가 아닌 결정론적 비예측성."],
["나비 효과란?","초기 조건의 미세한 차이가 시간이 지남에 따라 기하급수적으로 증폭되어 완전히 다른 결과를 만드는 현상. 로렌츠가 기상 모델에서 발견."],
["프랙탈이란?","부분이 전체와 유사한 구조가 무한히 반복되는 기하학적 형태. 해안선, 구름, 나뭇가지, 혈관 등 자연에 편재."],
["만델브로 집합","복소수 평면에서 반복 함수의 수렴/발산을 시각화한 프랙탈. 무한한 자기유사적 세부 구조를 가진 수학적 아름다움의 극치."],
["로렌츠 어트랙터","카오스적 기상 모델의 궤적이 만드는 나비 날개 모양의 끌개. 결정론적이지만 비주기적인 운동을 시각화."],
["파이겐바움 상수","전혀 다른 카오스 시스템에서 동일하게 나타나는 보편 상수(δ≈4.669). 카오스에도 보편 법칙이 존재함을 시사."],
["결정론과 예측 불가능성의 공존","카오스 시스템은 완전히 결정론적(무작위 아님)이지만 장기 예측은 불가. 라플라스 결정론의 실질적 붕괴."],
["이상한 끌개란?","카오스 시스템의 상태가 상공간에서 수렴하는 프랙탈 구조. 무질서 속의 숨겨진 질서."],
["비선형 역학이란?","입력과 출력이 비례하지 않는 시스템의 동역학. 선형 과학으로는 설명 불가능한 자연 현상 대부분이 비선형."],
["기상 예측의 근본적 한계","카오스 이론에 의해 약 2주 이상의 날씨 예측은 원리적으로 불가능. 이는 측정 기술이 아닌 자연의 본질적 한계."],
["삼체 문제","세 물체의 중력 상호작용은 일반적으로 해석적 해가 없으며 카오스적 행동을 보임. 뉴턴 이래 미해결."],
["자기유사성이란?","축척을 바꿔도 동일한 패턴이 반복되는 성질. 프랙탈의 핵심 특성. 해안선을 확대할수록 더 많은 세부 구조가 나타남."],
["생태학과 카오스","개체군 동태(로지스틱 방정식)에서 카오스적 행동 발견. 간단한 생태 모델도 예측 불가능한 변동을 보임."],
["심장 리듬과 카오스","건강한 심장은 적당한 카오스적 변동을 가짐. 지나치게 규칙적이거나 불규칙한 리듬은 질병의 징후."],
["복잡계 과학이란?","많은 요소의 상호작용에서 창발적 행동이 나타나는 시스템을 연구. 카오스 이론, 네트워크 과학, 자기조직화 등 포함."],
["2026년 카오스 이론의 응용","기후 모델링, AI 시계열 예측, 금융 위기 분석, 전염병 확산 모델링 등에 카오스 이론이 활발히 적용."],
["분기(bifurcation)란?","시스템의 매개변수가 변할 때 갑자기 질적으로 다른 행동이 나타나는 현상. 주기 배증 분기가 카오스로의 경로."],
["이 책의 한계","카오스 이론의 혁명성 과장 가능성. 수학적 엄밀성보다 이야기에 치중. 비평형 통계역학 등 관련 분야 소홀."],
["과학고 학생 교훈","① 선형 사고의 한계 인식 ② 자연의 복잡성 이해 ③ 분야 간 보편 법칙 ④ 예측 한계의 겸손 ⑤ 시각화의 힘"],
["후속 탐구","① 비선형 동역학 ② 프랙탈 기하학 ③ 복잡계 과학 ④ 네트워크 이론 ⑤ 기후 모델링"]
]},
{id:22,title:"과학과 근대세계",author:"화이트헤드",field:"과학사/철학",
bio:"영국 수학자·철학자. 러셀과 함께 《수학 원리(Principia Mathematica)》공저. 하버드대 철학과 교수. 과정철학 창시자.",
episodes:["러셀과 10년간 《수학 원리》를 공동 집필하여 논리주의 수학기초론의 기념비적 업적을 남겼다.","63세에 영국에서 미국 하버드로 건너가 철학으로 전향한 독특한 지적 여정을 걸었다.","기계론적 세계관을 비판하고 유기체적 철학을 제시하여 생태학 사상에 깊은 영향을 미쳤다."],
keys:["17세기 과학혁명이 근대 세계를 형성했지만, 기계론적 세계관의 한계도 드러냈다.","자연을 단순한 기계로 보는 관점은 생명, 의식, 가치를 설명하지 못한다.","과학·철학·종교·예술의 통합적 이해가 문명의 건강을 위해 필요하다.","모든 존재는 과정(process)이며, 정적 실체가 아닌 동적 생성이 실재의 본질이다."],
report:"화이트헤드의 《과학과 근대세계》는 17세기 과학혁명이 어떻게 근대 세계를 형성했으며, 그 기계론적 세계관이 가진 한계가 무엇인지를 탐구하는 과학철학의 고전이다. 뉴턴과 갈릴레오 이후 자연을 수학적 법칙에 따르는 기계로 보는 관점이 지배적이 되었으나, 화이트헤드는 이 환원적 유물론이 생명, 의식, 미적 경험, 가치 등 실재의 본질적 측면을 누락한다고 비판한다. 가장 인상적이었던 것은 구체성의 오류라는 개념이다. 추상적 수학 모델을 구체적 현실 그 자체로 착각하는 오류가 근대 과학의 고질적 문제라는 지적은 날카롭다. 화이트헤드는 대안으로 유기체 철학을 제시하며, 모든 존재를 정적 실체가 아닌 동적 과정으로 이해해야 한다고 주장한다. 이는 양자역학의 과정적 성격, 생태학의 유기체적 관계, 복잡계의 창발 현상과 깊이 공명한다. 다만 화이트헤드의 문체가 극도로 추상적이고 난해하여 접근성이 낮다는 한계가 있다. 과학기술이 사회를 급격히 변화시키는 현재, 과학의 성과와 한계를 철학적으로 성찰하는 이 책의 가치는 오히려 커지고 있다.",
cards:[
["구체성의 오류란?","추상적 모델을 구체적 현실 그 자체로 착각하는 오류. 수학적 물리학이 자연의 풍부한 경험을 누락하는 문제."],
["기계론적 세계관의 한계","뉴턴적 세계관은 자연을 시계처럼 봄. 생명·의식·가치·아름다움을 설명하지 못하는 근본적 한계."],
["유기체 철학이란?","화이트헤드의 대안적 형이상학. 모든 존재는 정적 실체가 아닌 동적 과정(process)이며 상호 관계 속에서 생성."],
["과정과 실재","화이트헤드의 핵심 저작 제목이자 핵심 개념. 실재는 고정된 사물이 아닌 끊임없는 생성(becoming)의 과정."],
["과학혁명의 세계사적 의미","17세기 갈릴레오·뉴턴의 업적이 자연관·인간관·사회관 전체를 근본적으로 변혁."],
["낭만주의 반발","기계론적 세계관에 대한 시인과 예술가의 반발. 워즈워스·셸리 등이 자연의 유기적 아름다움을 옹호."],
["수학과 물리학의 관계","화이트헤드는 수학이 자연을 기술하는 추상적 도구이지 자연 그 자체가 아님을 강조."],
["자연의 이분법 비판","물리적 세계(객관)와 감각 경험(주관)을 분리하는 근대적 이분법이 실재를 왜곡한다는 비판."],
["과학과 종교의 관계","화이트헤드는 둘의 대립이 근대의 인위적 산물이며, 통합적 이해가 가능하다고 주장."],
["환원주의의 한계","전체를 부분의 합으로 설명하려는 태도. 생명과 의식처럼 부분에서 예측할 수 없는 창발적 성질을 놓침."],
["양자역학과 과정 철학","양자 사건의 과정적·관계적 성격이 화이트헤드의 철학과 공명. 관측이 실재를 구성한다는 관점."],
["생태학과 유기체 철학","만물이 상호 연결된 유기적 전체라는 관점은 현대 생태학·시스템 사고의 철학적 기초."],
["러셀과의 협력과 결별","《수학 원리》공저 후 러셀은 분석철학으로, 화이트헤드는 형이상학으로 갈림. 지적 동반자의 분기."],
["추상화의 가치와 위험","추상화는 과학의 핵심 도구이지만, 추상화가 누락하는 것을 인식하는 것이 중요."],
["과학의 역사적 맥락","과학은 시대·문화·사회로부터 독립적이지 않으며, 역사적 맥락 안에서 이해해야 한다."],
["2026년 이 책의 의미","AI가 추상 모델에 기반하는 현재, 구체성의 오류 경고는 그 어느 때보다 유효."],
["문명의 건강","과학·철학·종교·예술이 균형을 이룰 때 문명이 건강. 한 분야의 독주는 위험."],
["이 책의 한계","극도로 추상적 문체, 낮은 접근성. 현대 과학 발전(양자역학, 복잡계) 미반영. 실천적 제안 부족."],
["과학고 학생 교훈","① 과학의 철학적 기초 인식 ② 환원주의의 힘과 한계 ③ 학제간 융합 ④ 과학사적 관점 ⑤ 추상화의 양면성"],
["후속 탐구","① 과학철학 입문 ② 양자역학 해석 ③ 복잡계와 창발 ④ 생태학 사상 ⑤ 과정신학"]
]},
{id:23,title:"침묵의 봄",author:"레이첼 카슨",field:"융합",
bio:"미국 해양생물학자·작가. 존스홉킨스대 동물학 석사. 미국 환경운동의 어머니. 이 책으로 DDT 금지와 EPA 설립에 기여.",
episodes:["출간 후 화학 업계의 조직적 공격에 직면했으나, 케네디 대통령의 과학 자문위원회가 그녀의 주장을 지지.","유방암 투병 중에도 집필을 완수. 출간 2년 후인 1964년 56세로 타계.","이 책은 TIME지 '20세기 가장 영향력 있는 논픽션 100선'에 선정."],
keys:["화학 살충제의 무분별한 사용은 생태계 전체에 연쇄적 피해를 야기한다.","생태계는 상호 연결된 그물이며, 한 요소의 교란이 전체에 파급된다.","과학기술에 대한 맹목적 신뢰는 위험하며, 비판적 검증이 필수적이다.","시민은 환경 정책에 대해 알 권리가 있으며, 과학적 정보에 접근할 수 있어야 한다."],
report:"레이첼 카슨의 《침묵의 봄》은 DDT 등 합성 살충제의 생태계 파괴를 과학적으로 고발하여 현대 환경운동의 시발점이 된 기념비적 저작이다. 제목은 새가 사라져 봄이 와도 새소리가 들리지 않는 미래를 상상한 것으로, 강렬한 시작이 독자의 마음을 사로잡는다. 카슨은 DDT가 먹이사슬을 통해 생물농축되어 매와 독수리의 알 껍질을 얇게 만들고, 수생 생태계를 오염시키며, 인간에게도 암 위험을 높인다는 증거를 체계적으로 제시했다. 가장 인상 깊었던 것은 생태계의 상호 연결성에 대한 통찰이다. 살충제로 한 종을 제거하면 그 천적이 사라지고, 내성을 가진 해충이 오히려 폭발하는 역설적 상황은 단순한 기술적 해결책의 위험성을 보여준다. 화학 업계의 조직적 공격에도 불구하고 과학적 사실에 기반한 카슨의 용기는 과학자의 사회적 책임의 모범이다. 다만 DDT의 말라리아 퇴치 공로도 인정해야 한다는 균형 잡힌 시각이 필요하다. 기후변화와 미세플라스틱 오염이 심각한 현재, 이 책의 경고는 60년이 지난 지금도 유효하다.",
cards:[
["DDT란?","디클로로디페닐트리클로로에탄. 강력한 합성 살충제. 2차 대전 중 말라리아 방지에 활용. 이후 농업에 광범위 사용되며 환경오염 유발."],
["생물농축이란?","먹이사슬을 따라 오염물질의 농도가 점점 높아지는 현상. DDT가 플랑크톤→물고기→새로 이동하며 수천 배 농축."],
["침묵의 봄 제목의 의미","새가 사라져 봄이 와도 새소리가 없는 미래. 살충제 남용의 생태적 결과를 상징적으로 표현."],
["DDT의 알 껍질 영향","DDT 대사산물(DDE)이 새의 칼슘 대사를 교란, 알 껍질이 얇아져 부화 실패. 매·독수리 개체수 격감."],
["생태계의 상호연결성","하나의 종 제거가 전체 생태계에 연쇄 파급. 살충제로 해충 천적도 제거→해충 재폭발의 역설."],
["해충 내성 문제","살충제에 살아남은 개체가 번식→내성 해충 증가→더 강한 살충제 필요→악순환. 진화의 메커니즘."],
["통합 해충 관리(IPM)","화학 살충제 대신 천적 이용, 생물 방제, 최소량 사용 등을 조합하는 지속가능한 해충 관리 전략."],
["카슨 vs 화학 업계","출간 후 업계의 조직적 공격(히스테리컬 여성이라는 성차별적 비난 포함). 과학적 사실이 결국 승리."],
["EPA 설립","이 책의 영향으로 1970년 미국 환경보호국(EPA) 설립. 환경 정책의 제도적 기반 마련."],
["사전예방 원칙","위험이 과학적으로 완전히 증명되기 전에도 예방 조치를 취해야 한다는 원칙. 카슨의 주장이 이 원칙의 선구."],
["과학자의 사회적 책임","카슨은 과학 지식을 대중에게 알리고 정책 변화를 이끈 과학자 시민의 모범."],
["DDT의 양면성","말라리아 퇴치 공로도 큼. 완전 금지보다 제한적·통제된 사용이 더 나은 전략일 수 있다는 균형적 관점."],
["잔류성 유기오염물질(POPs)","DDT처럼 환경에 오래 잔류하며 생물농축되는 화학물질. 스톡홀름 협약으로 국제적 규제."],
["환경과학의 탄생","이 책이 환경과학을 독립적 학문 분야로 확립하는 데 기여. 생태학·독성학·환경정책의 융합."],
["2026년 환경 문제","미세플라스틱, 기후변화, 생물다양성 감소 등 카슨의 경고가 새로운 형태로 반복. PFAS('영원한 화학물질') 문제."],
["과학 커뮤니케이션의 힘","뛰어난 글쓰기가 과학적 발견을 사회적 변화로 전환하는 핵심 역할."],
["자연과 인간의 관계","카슨: 인간은 자연의 주인이 아니라 일부. 겸손한 공존이 지속가능성의 기본."],
["이 책의 한계","일부 과학적 주장의 과장(DDT 발암성 증거 불충분 시기). DDT 말라리아 퇴치 공로 경시."],
["과학고 학생 교훈","① 생태계적 사고 ② 과학의 사회적 영향 ③ 비판적 과학 리터러시 ④ 용기 있는 소통 ⑤ 지속가능성"],
["후속 탐구","① 생태학 기초 ② 독성학 ③ 기후변화 과학 ④ 환경정책·법 ⑤ 지속가능 화학"]
]},
{id:24,title:"특이점이 온다",author:"레이 커즈와일",field:"융합",
bio:"미국 발명가·미래학자·AI 연구자. 구글 엔지니어링 이사. OCR·음성 합성·전자 건반 등 발명. 기술적 특이점 개념의 대중화에 기여.",

report:"레이 커즈와일의 《특이점이 온다》는 기술 발전의 지수적 가속이 인류 문명을 근본적으로 변혁할 특이점으로 이끌고 있다는 대담한 예측을 제시한다. 커즈와일은 무어의 법칙을 넘어 수확 가속의 법칙을 제안한다. 기술은 선형이 아닌 지수적으로 발전하며, 이 가속은 점점 빨라져 2045년경 인공지능이 인간 지능을 초월하는 특이점에 도달한다는 것이다. 나노기술로 인체를 분자 수준에서 수리하고, 유전공학으로 질병을 제거하며, AI와 뇌를 직접 연결하여 지능을 증강한다는 비전은 SF를 현실로 옮기는 것처럼 보인다. 실제로 2026년 현재 대규모 언어모델의 급격한 발전은 커즈와일의 예측이 완전히 허무맹랑하지 않았음을 보여준다. 그러나 기술 결정론적 시각에 대한 비판은 필수적이다. 기술 발전이 항상 인류에게 이로운 것은 아니며, AI 안전성, 기술 불평등, 인간 정체성의 문제 등이 해결되지 않은 채 특이점을 맞이할 위험이 있다. 이 책은 기술 낙관주의의 흥분과 함께 비판적 사고의 필요성을 동시에 일깨워주었다.",

episodes:["특허청 직원이던 26세에 특수상대성이론, 광전효과, 브라운운동 논문을 발표한 '기적의 해'(1905).","일반상대론의 장방정식을 완성하기까지 8년간 수학적 난관과 씨름하며 리만 기하학을 독학.","원자폭탄 개발을 촉구하는 편지를 루즈벨트에게 보냈으나, 이후 핵군축 운동에 헌신."],
keys:["시간과 공간은 절대적이 아니라 관측자에 따라 다르다(특수상대론).","중력은 힘이 아니라 질량에 의한 시공간의 곡률이다(일반상대론).","E=mc²: 질량과 에너지는 등가이며 서로 전환 가능하다.","물리 법칙은 모든 관측자에게 동일해야 한다(상대성 원리)."],
report:"아인슈타인의 상대성 이론은 뉴턴 이래 200년간 확고했던 절대적 시간과 공간의 개념을 근본적으로 뒤엎은 물리학의 혁명이다. 특수상대론에서 빛의 속도가 모든 관측자에게 동일하다는 단순한 원리에서 시간 팽창, 길이 수축, 질량-에너지 등가(E=mc²)라는 놀라운 결과가 도출되는 과정은 논리적 사고의 극치를 보여준다. 일반상대론은 더욱 대담하다. 중력이 힘이 아니라 질량과 에너지에 의한 시공간의 곡률이라는 기하학적 해석은, 뉴턴의 만유인력을 완전히 새로운 차원에서 재해석한다. 가장 인상 깊었던 것은 1919년 일식 관측에서 태양 옆을 지나는 별빛의 휨이 일반상대론의 예측과 일치한 역사적 순간이다. 이론의 아름다움이 자연에 의해 확인되는 과학의 궁극적 순간이었다. GPS 위성의 시간 보정에 상대론이 사용되는 것은 이 추상적 이론의 실용적 가치를 보여준다. 중력파 관측, 블랙홀 촬영 등 2026년 현재에도 상대론의 예측이 계속 확인되고 있으며, 양자중력이론이라는 다음 혁명을 향한 출발점이 되고 있다.",
cards:[
["특수상대론의 두 공준","① 물리 법칙은 모든 관성계에서 동일 ② 진공에서 빛의 속도는 관측자에 무관하게 일정(c)."],
["시간 팽창","움직이는 시계는 정지한 시계보다 느리게 간다. v→c일수록 효과 커짐. GPS 위성에서 실제 보정 필요."],
["길이 수축","운동 방향으로 물체의 길이가 줄어듦. 로렌츠 수축. 빛의 속도에 가까울수록 현저."],
["E=mc²의 의미","질량과 에너지는 등가. 소량의 질량이 막대한 에너지로 전환 가능. 핵에너지·핵무기의 원리."],
["일반상대론의 핵심","중력=시공간의 곡률. 질량·에너지가 시공간을 휘게 하고, 물체는 휘어진 시공간의 측지선을 따라 운동."],
["아인슈타인 장방정식","Gμν = 8πG/c⁴ × Tμν. 시공간의 기하(좌변)와 물질·에너지 분포(우변)를 연결하는 핵심 방정식."],
["등가 원리","중력과 가속도는 구별 불가. 엘리베이터 사고실험: 자유낙하하는 엘리베이터 안에서는 중력이 사라짐."],
["1919년 일식 관측","에딩턴의 관측: 태양 옆 별빛의 휨이 일반상대론 예측과 일치. 아인슈타인을 세계적 유명인으로 만든 실험."],
["블랙홀의 예측","슈바르츠실트 해: 일반상대론에서 질량이 충분히 밀집하면 빛도 탈출 불가. 블랙홀 개념의 탄생."],
["중력파란?","시공간의 물결. 질량의 가속운동에서 방출. 2015년 LIGO가 최초 직접 관측. 아인슈타인의 마지막 예측 확인."],
["쌍둥이 역설","한 쌍둥이가 빛에 가까운 속도로 여행하면 돌아왔을 때 다른 쌍둥이보다 젊다. 시간 팽창의 극적 사례."],
["GPS와 상대론","GPS 위성 시계는 특수상대론(느려짐)과 일반상대론(빨라짐) 보정이 필수. 안 하면 하루 ~10km 오차."],
["리만 기하학과 일반상대론","아인슈타인은 리만의 곡률 기하학을 중력 이론의 수학적 프레임워크로 사용. 수학이 물리를 선도한 사례."],
["기적의 해(1905)","26세 특허청 직원이 특수상대론·광전효과·브라운운동 논문 발표. 과학사 최대의 천재적 성취."],
["아인슈타인과 양자역학","양자역학의 확률적 성격에 반대. EPR 역설 제기. 그러나 벨 실험에서 양자역학이 승리."],
["수성 근일점 이동","뉴턴 역학으로 설명 못한 수성 궤도의 미세한 이동. 일반상대론이 정확히 예측하여 이론의 첫 검증."],
["시공간이란?","3차원 공간 + 1차원 시간의 4차원 연속체. 민코프스키가 특수상대론의 수학적 프레임워크로 제안."],
["2026년 상대론의 현재","중력파 천문학, EHT 블랙홀 촬영, 양자중력 연구 등에서 상대론이 계속 검증·확장 중."],
["이 책의 한계","아인슈타인의 해설서는 수학적 배경 없이 완전 이해 어려움. 양자역학과의 통합(양자중력) 미완."],
["후속 탐구","① 특수상대론 수학 ② 텐서 해석학·리만 기하 ③ 블랙홀 물리 ④ 양자중력 ⑤ 중력파 천문학"]
]},
{id:27,title:"종의 기원",author:"찰스 다윈",field:"생물",
bio:"영국 박물학자. 비글호 항해(1831-36)에서 관찰 자료 수집. 자연선택에 의한 진화론을 확립. 생물학의 패러다임을 근본적으로 전환.",
episodes:["비글호에서 갈라파고스 핀치새의 부리 차이를 관찰한 것이 자연선택 이론의 핵심 영감이 되었다.","월리스가 유사한 이론을 독립 발견하자 공동 발표 후 서둘러 《종의 기원》을 집필.","종교계와의 격렬한 논쟁에도 불구하고 생전에 과학계의 광범위한 지지를 얻었다."],
keys:["생물 종은 불변이 아니라 시간에 따라 변화한다(진화).","자연선택: 환경에 적합한 변이가 생존·번식에 유리하여 축적된다.","공통 조상에서의 분기가 생물 다양성을 만든다(생명의 나무).","진화에는 목적이나 방향이 없으며, 환경 적응의 맹목적 과정이다."],
report:"찰스 다윈의 《종의 기원》은 자연선택에 의한 진화라는 단순하면서도 강력한 원리로 생명의 다양성을 설명하여 생물학의 패러다임을 영원히 바꾼 역작이다. 다윈의 논증은 네 단계로 전개된다. 개체들 사이에 변이가 존재하고, 자원은 한정되어 생존 경쟁이 벌어지며, 환경에 유리한 변이를 가진 개체가 더 많이 번식하고, 이 유리한 형질이 다음 세대에 전달되어 축적된다. 이 단순한 메커니즘이 수십억 년에 걸쳐 작동하여 박테리아에서 인간에 이르는 모든 생명의 다양성을 만들어냈다. 가장 인상 깊었던 것은 다윈이 자신의 이론에 대한 반론을 스스로 제기하고 답변하는 지적 정직성이다. 눈처럼 복잡한 기관의 진화, 화석 기록의 불완전성 등 약점을 회피하지 않고 정면으로 다루는 태도는 과학적 글쓰기의 모범이다. 다만 다윈은 유전의 메커니즘(DNA)을 알지 못했으며, 멘델의 유전학과의 종합은 후대에 이루어졌다. 유전체학과 CRISPR가 발전한 현재, 다윈의 통찰은 분자 수준에서 더욱 정교하게 확인되고 확장되고 있다.",
cards:[
["자연선택이란?","환경에 유리한 변이를 가진 개체가 생존·번식에 유리 → 형질이 축적되어 종이 변화하는 메커니즘."],
["적자생존의 의미","'가장 강한 자'가 아닌 '환경에 가장 적합한 자'의 생존. 적합성(fitness)은 환경에 상대적."],
["공통 조상의 개념","모든 생물은 하나(또는 소수)의 공통 조상에서 분기. 생명의 나무(Tree of Life)."],
["변이의 중요성","개체 간 차이가 자연선택의 원재료. 다윈은 변이의 원인(유전)을 몰랐으나 그 중요성은 정확히 인식."],
["비글호 항해의 의미","5년간의 세계 일주(1831-36). 갈라파고스·남미 등에서 관찰한 자료가 진화론의 경험적 기반."],
["갈라파고스 핀치새","섬마다 부리 형태가 다른 핀치새. 환경(먹이)에 따른 적응 방산의 증거."],
["인위선택과 자연선택","인간의 품종 개량(인위선택)이 자연선택의 유비. 다윈은 이를 자연선택의 증거로 제시."],
["점진주의","진화는 갑작스런 도약이 아닌 미세한 변화의 점진적 축적. '자연은 도약하지 않는다.'"],
["멘델 유전학과의 종합","다윈은 유전 메커니즘을 몰랐으나, 20세기 멘델 유전학과 결합(현대 종합설)되어 이론 완성."],
["화석 기록의 불완전성","중간 형태 화석의 부족. 다윈은 이를 인정하되 화석화 과정의 희소성과 지질학적 기록의 불완전성으로 설명."],
["성선택이란?","생존보다 번식 성공에 유리한 형질의 선택. 공작 꼬리 등 생존에 불리해 보이는 형질을 설명."],
["종분화 메커니즘","지리적 격리(이소적 종분화)가 대표적. 격리된 개체군이 다른 환경에 적응하여 별개의 종으로 분화."],
["수렴 진화","다른 계통의 생물이 유사한 환경에 적응하여 비슷한 형태를 진화. 돌고래와 상어의 유선형 체형."],
["진화의 증거 5가지","① 화석 기록 ② 비교 해부학 ③ 발생학 ④ 생물지리학 ⑤ 분자생물학(DNA 비교)."],
["다윈의 지적 정직성","자기 이론의 약점을 스스로 제기하고 답변. 눈의 진화, 화석 불완전성 등을 정면 다룸."],
["현대 진화론의 확장","중립 진화, 후성유전, 수평 유전자 전달, 공생 진화 등이 다윈 이론을 보완·확장."],
["진화와 윤리","진화론은 사실에 대한 이론이지 가치에 대한 주장이 아님. 사회진화론의 오용 경계 필요."],
["2026년 진화학 현재","유전체학, CRISPR, 고DNA 분석 등으로 진화 과정을 분자 수준에서 실시간 관찰 가능."],
["이 책의 한계","유전 메커니즘 부재. 점진주의의 한계(단속평형설). 현대 분자생물학 발전 미반영."],
["후속 탐구","① 집단유전학 ② 후성유전학 ③ 고유전체학 ④ 진화발생생물학(evo-devo) ⑤ 종분화 이론"]
]},
{id:28,title:"불완전성 정리",author:"더글라스 호프스태터 해설",field:"수학/철학",
bio:"괴델의 불완전성 정리를 호프스태터가 해설한 판본. 괴델(1906-1978)은 오스트리아 출신 논리학자. 아인슈타인의 친구이자 프린스턴 고등연구소 동료.",
episodes:["괴델은 25세에 불완전성 정리를 증명하여 수학 기초론을 영원히 바꿨다.","아인슈타인은 프린스턴에서 괴델과 함께 산책하며 대화하는 것이 유일한 낙이라고 말했다.","극도의 편집증으로 식중독을 두려워해 아내가 음식을 맛본 후에야 먹었으며, 아내 입원 후 굶어서 사망."],
keys:["충분히 강력한 형식 체계에는 참이지만 증명 불가능한 명제가 존재한다(제1 불완전성).","형식 체계는 자신의 무모순성을 증명할 수 없다(제2 불완전성).","수학의 진리와 증명 가능성은 동일하지 않다.","자기참조는 논리적 한계를 드러내는 동시에 수학의 깊이를 보여준다."],
report:"괴델의 불완전성 정리는 20세기 수학과 철학에서 가장 충격적인 발견 중 하나이다. 제1 불완전성 정리는 자연수의 산술을 포함하는 무모순적 형식 체계에는 반드시 참이지만 그 체계 안에서 증명할 수 없는 명제가 존재한다는 것이다. 이는 힐베르트가 꿈꿨던 수학의 완전한 형식화가 원리적으로 불가능함을 증명한 것으로, 수학 기초론의 풍경을 영원히 바꿔놓았다. 제2 정리는 더욱 충격적이다. 그러한 체계는 자기 자신의 무모순성도 증명할 수 없다. 증명의 핵심은 괴델 번호 매기기라는 기법으로, 수학적 명제를 자연수에 대응시켜 체계가 자기 자신에 대해 말할 수 있게 만든 것이다. 이 자기참조적 구조에서 이 명제는 증명 불가능하다라는 문장을 구성함으로써 역설적 상황을 만들어낸다. 가장 인상적인 것은 이 결과가 수학의 약점이 아니라 오히려 깊이를 보여준다는 점이다. 수학적 진리는 어떤 형식 체계보다도 풍부하다는 의미이기 때문이다. 다만 이 정리가 인간 사고나 AI의 한계에 대해 시사하는 바는 여전히 철학적 논쟁의 대상이다.",
cards:[
["제1 불완전성 정리","자연수 산술을 포함하는 무모순적 형식 체계에는 참이지만 그 안에서 증명할 수 없는 명제가 존재."],
["제2 불완전성 정리","그러한 형식 체계는 자기 자신의 무모순성을 증명할 수 없다."],
["괴델 번호 매기기","수학 명제→고유 자연수 대응. 체계가 자기 자신에 대해 말할 수 있게 하는 핵심 기법."],
["괴델 문장","'이 문장은 증명 불가능하다'에 해당하는 수학적 명제. 참이면 증명 불가, 거짓이면 모순."],
["힐베르트 프로그램","수학의 완전성·무모순성·결정가능성을 증명하려는 프로그램. 괴델이 불가능을 증명."],
["형식 체계란?","공리+추론 규칙의 집합. 기계적으로 증명을 생성할 수 있는 수학적 시스템."],
["무모순성이란?","어떤 명제와 그 부정이 동시에 증명되지 않는 성질. 건전한 수학 체계의 기본 요건."],
["완전성이란?","모든 참인 명제가 증명 가능한 성질. 괴델은 충분히 강력한 체계에서 이것이 불가능함을 보임."],
["자기참조의 역할","거짓말쟁이 역설(이 문장은 거짓이다)의 수학적 변형. 자기참조가 형식 체계의 한계를 드러냄."],
["결정 불가능성","참/거짓을 판별할 알고리즘이 없는 문제. 정지 문제(튜링)가 대표적. 괴델 정리와 깊이 연결."],
["페아노 산술","자연수의 기본 성질(0 존재, 후자 함수, 수학적 귀납법)을 공리화한 체계. 괴델 정리가 적용되는 최소한의 체계."],
["로서의 정리","괴델 정리의 강화. 원래보다 약한 조건에서도 불완전성이 성립함을 증명."],
["오메가 무모순성","괴델 원래 증명에 사용된 조건. 후에 로서가 단순 무모순성으로 충분함을 보임."],
["연속체 가설과의 관계","괴델은 연속체 가설이 ZFC 공리계와 무모순임을 증명. 코언이 독립임을 증명. 불완전성의 구체적 사례."],
["AI와 괴델 정리","기계가 인간을 초월할 수 없다는 논증(루카스·펜로즈)에 사용. 그러나 이 논증에 대한 반론도 존재."],
["인간 마음과 괴델 정리","인간 사고가 형식 체계를 넘어서는가? 괴델 본인은 인간 직관이 기계적 증명을 초월한다고 시사."],
["수학적 진리 vs 증명 가능성","괴델 정리의 핵심: 진리는 증명 가능성보다 넓다. 수학에는 알 수 없는 것이 반드시 존재."],
["2026년 괴델 정리의 의미","형식 검증(Lean, Coq), AI 추론의 한계, 양자 컴퓨팅의 계산 한계 등에서 괴델의 유산이 활발히 연구."],
["이 책의 한계","증명의 완전한 이해에는 상당한 수학적 배경이 필요. 철학적 함의에 대한 과대 해석 경계."],
["후속 탐구","① 수리논리학 기초 ② 튜링 기계와 계산이론 ③ 집합론 공리계 ④ AI와 괴델 ⑤ 수학 철학"]
]},
{id:29,title:"양자역학과 경로적분",author:"리처드 파인만",field:"물리",
bio:"앞서 1학년에서 다룬 파인만. 이 책은 그의 경로적분 형식론을 직접 소개한 교재급 저술로, 양자역학의 가장 독창적인 재형식화를 제시한다.",
episodes:["경로적분은 파인만이 디랙의 한 논문에서 힌트를 얻어 프린스턴 박사 논문으로 발전시킨 것이다.","파인만 다이어그램과 결합하여 양자전기역학의 실용적 계산법을 혁명적으로 개선.","이 형식론은 양자장론, 통계역학, 금융수학에까지 응용되는 보편적 도구가 되었다."],
keys:["양자역학에서 입자는 가능한 모든 경로를 동시에 따르며, 각 경로의 기여를 합산한다.","고전역학의 최소작용원리가 양자역학의 경로적분으로 자연스럽게 일반화된다.","양자 간섭은 서로 다른 경로의 확률진폭이 더해지거나 상쇄되는 현상이다.","물리학의 본질은 자연의 가능성 전체를 고려하는 것이다."],
report:"파인만의 《양자역학과 경로적분》은 양자역학을 완전히 새로운 관점에서 재형식화한 독창적 저작이다. 슈뢰딩거의 파동함수나 하이젠베르크의 행렬 대신, 입자가 A에서 B로 갈 때 가능한 모든 경로를 동시에 고려하고 각 경로의 기여를 합산한다는 아이디어는 양자역학의 가장 직관적이면서도 심오한 해석이다. 각 경로는 작용(action)에 비례하는 위상을 갖고, 이 위상들의 간섭이 양자역학적 확률을 결정한다. 고전역학에서는 작용이 최소인 경로 하나만 실현되지만, 양자역학에서는 모든 경로가 기여한다는 점이 핵심적 차이이다. 이것이 고전역학의 최소작용원리가 양자적으로 일반화되는 아름다운 방식이다. 이중 슬릿 실험에서 입자가 두 슬릿을 동시에 통과한다는 양자적 기묘함이 경로적분의 관점에서는 자연스럽게 설명된다. 다만 이 책은 수학적 수준이 높아 상당한 물리·수학 배경이 필요하다. 양자장론과 양자중력의 핵심 도구가 된 경로적분의 보편성은 파인만의 천재성을 증명하며, 물리학의 심층 구조를 이해하려는 과학고 학생에게 도전적이면서도 보람 있는 독서가 될 것이다.",
cards:[
["경로적분이란?","입자가 A→B로 갈 때 가능한 모든 경로의 확률진폭을 합산하여 전이 확률을 계산하는 양자역학적 방법."],
["작용(action)이란?","라그랑지안을 시간에 대해 적분한 물리량. 고전역학에서는 작용이 최소인 경로가 실현(최소작용원리)."],
["양자 경로와 고전 경로의 관계","ℏ→0 극한에서 고전적 최소작용 경로만 살아남고 나머지는 상쇄. 양자→고전의 자연스러운 전환."],
["이중 슬릿 실험과 경로적분","입자는 슬릿1을 통과하는 경로와 슬릿2를 통과하는 경로를 모두 취하며, 두 경로의 간섭이 패턴을 생성."],
["확률진폭이란?","경로에 대응하는 복소수. 진폭의 절대값 제곱이 확률. 진폭이 더해져 간섭 효과를 만듦."],
["위상과 간섭","각 경로의 작용이 위상을 결정. 위상이 같은 경로들은 보강 간섭, 다른 경로들은 상쇄 간섭."],
["파인만 다이어그램","입자 상호작용을 시각적으로 표현하는 그림. 경로적분의 섭동 전개를 직관적으로 계산하는 도구."],
["양자전기역학(QED)","빛과 전자의 상호작용을 기술하는 이론. 파인만의 경로적분+다이어그램이 계산법을 혁명적으로 개선."],
["라그랑지안이란?","운동에너지-위치에너지. 고전역학의 라그랑지 역학에서 핵심 함수. 경로적분에서 각 경로의 가중치를 결정."],
["최소작용원리","자연은 작용이 극솟값인 경로를 따른다. 뉴턴 법칙의 동등한 재형식화이자 경로적분의 고전적 한계."],
["범함수 적분","보통 적분이 수의 합이라면, 경로적분은 함수(경로)의 합. 수학적으로 엄밀한 정의가 여전히 도전적."],
["고전 역학의 세 가지 형식","뉴턴(힘), 라그랑주(작용), 해밀턴(위상공간). 경로적분은 라그랑주 형식의 양자적 일반화."],
["가상 입자란?","에너지-시간 불확정성으로 잠깐 존재하는 입자. 파인만 다이어그램에서 내부선. 양자 요동의 핵심."],
["양자장론과 경로적분","경로적분은 양자장론(입자 생성·소멸 포함)의 표준적 형식화 방법. 현대 입자물리의 기본 도구."],
["통계역학과의 연결","양자역학의 경로적분이 통계역학의 분배함수와 수학적으로 동형. 시간→허수시간(윅 회전)으로 연결."],
["금융에서의 응용","블랙-숄즈 옵션 가격 모형이 경로적분과 유사한 수학적 구조. 물리학의 도구가 경제학에 전이된 사례."],
["디랙의 힌트","파인만은 디랙의 1933년 논문에서 라그랑지안과 양자역학의 연결 힌트를 얻어 경로적분을 발전."],
["2026년 경로적분의 위치","양자중력(양자 시공간의 경로적분), 격자 양자색역학 등 현대 이론물리의 핵심 도구."],
["이 책의 한계","고급 수학 필요(함수해석학, 복소해석). 수학적 엄밀성(경로적분의 측도론적 정의)이 불완전."],
["후속 탐구","① 라그랑주·해밀턴 역학 ② 양자장론 입문 ③ 파인만 다이어그램 ④ 통계역학 ⑤ 양자중력"]
]},
{id:30,title:"사피엔스",author:"유발 하라리",field:"융합",
bio:"이스라엘 역사학자. 히브리대 역사학과 교수. 옥스퍼드 박사. 거시역사(빅 히스토리) 관점에서 인류 문명을 분석하는 세계적 베스트셀러 작가.",
episodes:["이스라엘 군 복무 후 중세 전쟁사 연구로 시작하여 인류 전체의 역사로 시야를 확장.","비파사나 명상을 매일 2시간 실천하며, 이것이 명료한 사고의 원천이라고 밝혔다.","《사피엔스》→《호모 데우스》→《21세기를 위한 21가지 제언》의 3부작으로 과거-미래-현재를 조망."],
keys:["인지혁명: 허구를 만들고 믿는 능력이 호모 사피엔스의 결정적 차별점이다.","농업혁명은 역사 최대의 사기이며, 인류를 더 행복하게 만들지 못했을 수 있다.","과학혁명의 핵심은 '무지의 인정'이다.","인류의 미래는 생명공학과 AI에 의해 근본적으로 변할 수 있다."],
report:"유발 하라리의 《사피엔스》는 호모 사피엔스가 지구를 지배하게 된 과정을 인지혁명, 농업혁명, 과학혁명이라는 세 차례의 혁명으로 설명하는 거시 역사서이다. 가장 혁신적인 통찰은 인지혁명의 핵심이 허구를 만들고 공유하는 능력이라는 주장이다. 국가, 화폐, 종교, 법률, 기업 등은 모두 인간의 상상 속에만 존재하는 허구이지만, 이 허구가 수만 명의 협력을 가능케 하여 다른 동물과의 결정적 차이를 만들었다. 농업혁명이 역사 최대의 사기라는 도발적 주장도 인상적이다. 인류는 밀을 길들인 것이 아니라 밀에 의해 길들여졌으며, 농업은 더 긴 노동시간과 영양 불균형, 전염병 증가를 가져왔다는 역설적 분석은 진보에 대한 반성을 요구한다. 과학혁명의 핵심이 무지의 인정이라는 관점도 설득력이 있다. 다만 하라리의 주장이 때로 과도하게 단순화되고, 복잡한 역사적 과정을 하나의 내러티브로 환원한다는 비판도 유효하다. 생명공학과 AI가 인류의 정의 자체를 바꿀 수 있는 현재, 이 책이 던지는 질문은 더욱 절실해지고 있다.",
cards:[
["인지혁명이란?","약 7만 년 전 호모 사피엔스의 인지 능력이 질적으로 도약. 허구를 만들고 공유하는 능력이 핵심."],
["허구의 힘","국가·화폐·종교·법률은 상상의 산물이지만, 수만 명의 협력을 가능케 하는 실질적 힘을 가짐."],
["농업혁명='역사 최대의 사기'","밀이 인간을 길들임. 더 긴 노동, 영양 불균형, 전염병 증가. 개인의 삶은 악화되었으나 인구는 증가."],
["과학혁명의 핵심: 무지의 인정","이전 문화는 세계에 대해 알 것은 다 안다고 믿었음. 과학은 '모른다'는 인정에서 출발하여 탐구."],

const REPORTS = [
  `사이먼 싱의 《페르마의 마지막 정리》는 'x^n + y^n = z^n(n≥3)에 정수 해는 없다'는 단순한 명제 뒤에 감춰진 350년간의 지적 여정을 생생히 추적한 과학 논픽션이다. 이 책에서 가장 인상 깊었던 것은 앤드루 와일스가 7년간 비밀리에 연구하며 보여준 집념이다. 와일스는 어린 시절 도서관에서 이 문제를 접한 후 평생의 목표로 삼았고, 타니야마-시무라 추측이라는 전혀 다른 분야의 다리를 놓아 마침내 증명에 성공했다. 이 과정은 수학이 단순한 계산이 아니라 서로 다른 영역을 창의적으로 연결하는 예술임을 깨닫게 해주었다. 오일러, 소피 제르맹, 갈루아 등 350년간 도전했던 수학자들의 실패도 결코 헛되지 않았다. 각각의 실패가 새로운 수학 분야를 탄생시켰고, 와일스의 최종 증명에 필요한 도구를 마련했기 때문이다. 특히 증명 발표 후 심각한 오류가 발견되었을 때, 와일스가 이를 숨기지 않고 1년간 공개적으로 수정한 과정은 과학적 정직성의 모범을 보여준다. 다만 대중을 위해 수학적 내용을 다소 단순화한 점은 아쉬움으로 남는다. 이 책은 하나의 문제에 깊이 몰입하는 태도와 분야 간 융합적 사고의 가치를 일깨워주었으며, 정수론과 현대 암호학의 연결에 대해 더 탐구하고 싶은 동기를 부여했다.`,
  `김민형 교수의 《수학이 필요한 순간》은 수학이 추상적 학문이 아니라 삶의 복잡한 문제를 해결하는 사고의 도구임을 보여주는 책이다. 저자는 어린 시절 수학을 싫어했으나 대학에서 추상대수학의 구조적 아름다움에 매료되어 수학자가 되었다는 고백으로 시작한다. 이는 공식 암기에 지친 과학고 학생에게 신선한 관점을 제공한다. 이 책의 핵심 메시지는 수학적 사고란 정답을 찾는 것이 아니라 올바른 질문을 던지는 능력이라는 것이다. 특히 불확실성 속에서 확률적으로 사고하는 방법, 추상화를 통해 복잡한 현상의 본질을 추출하는 과정이 인상적이었다. 저자가 강조하는 '왜 그런지 묻는 습관'은 수학 공부를 넘어 과학 전반의 탐구 태도에 적용할 수 있다. 옥스퍼드와 에든버러에서 활동하는 저자의 경험에서 우러나온 조언들은 한국의 주입식 수학 교육에 대한 건설적 비판이기도 하다. 수학의 아름다움과 실용성을 동시에 조명하는 균형 잡힌 시각이 돋보인다. 다만 계산 훈련의 현실적 필요성을 경시하는 측면이 있고, 수학적 사고의 한계 영역에 대한 논의가 부족한 점은 아쉽다. AI 시대에 수학적 사고력이 더욱 중요해지는 현실에서, 이 책은 수학을 '왜' 배우는지에 대한 근본적 답을 제시해주는 의미 있는 저작이다.`,
  `리처드 파인만의 자전적 에세이 《파인만 씨 농담도 잘하시네》는 노벨 물리학상 수상자의 삶을 통해 과학적 태도의 본질이 무엇인지 유쾌하게 보여준다. 가장 인상 깊었던 것은 파인만이 노벨상 이후 연구 부담감으로 물리학의 재미를 잃었다가, 구내식당에서 접시가 돌아가는 모습을 보고 순수한 호기심으로 문제를 풀며 즐거움을 되찾은 일화이다. 그 '놀이'가 결국 노벨상 수상 연구의 출발점이었다는 사실은 창의성의 원천이 재미에 있음을 증명한다. 또한 브라질 학생들이 공식을 완벽히 암기하면서도 실제 물리 현상을 설명하지 못하는 장면은, 이해 없는 암기의 위험성을 경고하며 현재 한국 교육에도 시사하는 바가 크다. 챌린저호 사고 조사에서 O-링을 얼음물에 담그는 단순한 실험으로 원인을 밝힌 에피소드는 직관적이고 단순한 접근의 힘을 보여준다. 맨해튼 프로젝트 참여 경험은 과학의 파괴적 잠재력과 과학자의 사회적 책임이라는 무거운 주제를 제기하기도 한다. 파인만이 강조한 '카고 컬트 과학' 경고, 즉 형식만 갖추고 정직함은 결여된 유사과학에 대한 비판은 오늘날에도 유효하다. 이 책은 성적이나 입시를 넘어 과학을 진정으로 즐기는 태도가 궁극적으로 최고의 성과를 이끈다는 중요한 교훈을 주었다.`,
  `브라이언 그린의 《엘러건트 유니버스》는 현대 물리학의 최전선인 초끈이론을 일반 독자도 이해할 수 있도록 풀어낸 역작이다. 이 책의 핵심은 자연의 네 가지 기본 힘을 하나의 프레임워크로 통합하려는 물리학의 오랜 꿈이다. 물질의 최소 단위가 0차원 점이 아니라 진동하는 1차원 끈이며, 그 진동 패턴이 서로 다른 입자를 만든다는 아이디어는 놀라울 정도로 우아하다. 특히 일반상대성이론과 양자역학이 동시에 필요한 영역에서 두 이론이 충돌하는 문제를, 초끈이론이 10~11차원의 수학적 구조로 해결하려는 시도가 인상적이었다. 5가지 초끈이론을 하나의 11차원 M이론으로 통합한 위튼의 업적, 홀로그래피 원리를 제시한 말다세나의 AdS/CFT 대응 등 현대 이론물리의 성과들도 흥미진진하다. 그러나 이 책을 읽으며 초끈이론의 가장 큰 약점도 분명히 인식하게 되었다. 끈의 크기가 플랑크 길이에 달해 현재 기술로는 실험적 검증이 불가능하다는 점에서, 이것이 과학인가 수학인가라는 근본적 질문이 제기된다. 이론적 아름다움과 실험적 검증 사이의 긴장 관계를 이해하게 되었고, 양자중력이라는 미해결 문제에 대한 깊은 흥미를 갖게 되었다.`,
  `샘 킨의 《사라진 스푼》은 주기율표의 원소들에 얽힌 인간 드라마를 통해 화학이 단순한 암기 과목이 아니라 문명의 역사 그 자체임을 보여준다. 책 제목은 갈륨으로 만든 스푼이 뜨거운 차에서 녹아 사라지는 장난에서 유래한 것으로, 원소의 물리적 성질이 얼마나 놀라울 수 있는지를 상징한다. 가장 인상 깊었던 것은 프리츠 하버의 이야기다. 질소 고정법으로 수십억 명을 기아에서 구한 동시에 독가스를 개발하여 수천 명을 죽인 그의 삶은 과학의 양면성을 극적으로 보여준다. 이 외에도 방사성 원소를 연구하다 건강을 잃은 마리 퀴리, 이리듐 농도로 공룡 멸종의 원인을 밝혀낸 알바레즈 부자의 이야기, 초우라늄 원소를 합성하는 현대 과학자들의 도전까지 흥미로웠다. 리튬과 희토류 등 현대 필수 원소를 둘러싼 지정학적 경쟁은 화학이 국제 정치와 직결됨을 깨닫게 했다. 주기율표를 단순한 시험 범위가 아니라 인류 문명의 지도로 바라보는 시각을 선물해주었다. 다만 역사적 일화 중심의 서술이 화학 원리의 심화 설명보다 우선되는 점은 보완이 필요하다. AI 기반 신소재 발견이 활발한 현재, 원소의 성질을 깊이 이해하는 것이 미래 과학자에게 필수적임을 실감했다.`,
  `리처드 도킨스의 《이기적 유전자》는 진화의 기본 단위를 개체에서 유전자로 전환시킨 혁명적 관점의 전환을 보여준다. '이기적'이라는 표현은 유전자가 의식적으로 이기적이라는 뜻이 아니라, 자기 복제를 극대화하는 유전자가 자연선택에서 살아남는다는 비유이다. 가장 인상적이었던 논증은 이타적 행동의 설명이다. 혈연선택으로 가족 간 희생을, 호혜적 이타주의와 죄수의 딜레마로 비혈연 간 협력을 설명하는 과정은 생물학과 수학적 게임이론의 융합을 보여주는 아름다운 사례였다. 반복 게임에서 팃포탯 전략이 가장 성공적이라는 분석은 협력이 진화적으로도 합리적임을 수학적으로 증명한다. 또한 문화적 정보 단위인 밈 개념은 생물학적 진화를 넘어 문화 진화라는 새로운 시각을 열어주었고, 이는 인터넷 시대에 더욱 의미를 갖는다. 다만 이 책이 유전자 결정론으로 오해받는 점에 대해 비판적으로 생각해볼 필요가 있다. 유전자는 확률적 성향을 제공할 뿐이며 환경과 문화가 실제 행동을 형성한다. CRISPR 유전자 편집이 보편화되는 현재, 유전자의 맹목적 복제를 인간이 의식적으로 통제하는 시대의 윤리적 문제에 대해서도 깊이 생각하게 되었다.`,
  `에르빈 슈뢰딩거의 《생명이란 무엇인가》는 양자역학의 창시자가 물리학의 눈으로 생명의 본질을 탐구한 선구적 저작이다. 1944년에 쓰인 이 책이 놀라운 이유는 DNA 구조가 발견되기 9년 전에 유전 물질이 '비주기적 결정'이라는 형태일 것이라고 정확히 예측했기 때문이다. 실제로 왓슨과 크릭은 이 책에서 영감을 받아 DNA 이중나선 구조를 연구하기 시작했다고 밝혔다. 핵심 개념인 네겐트로피는 생명이 열역학 제2법칙에 거스르는 것이 아니라, 외부 환경의 엔트로피를 증가시키면서 내부의 질서를 유지한다는 통찰이다. 음식이라는 낮은 엔트로피 물질을 섭취하고 열과 폐기물이라는 높은 엔트로피를 방출하여 전체 균형을 맞추는 것이 생명의 열역학적 본질이다. 이는 물리학과 생물학의 경계를 허무는 학제 간 사고의 전형이다. 과학고에서 물리와 생물을 별개 과목으로 배우는 현실에서, 두 분야가 근본적으로 연결되어 있음을 깨닫게 해주었다. 다만 후성유전학이나 유전자 조절의 복잡성은 예측하지 못했다는 한계도 인정해야 한다. 양자생물학이 부상하는 현재, 80년 전 슈뢰딩거의 질문은 여전히 유효하며 미래 연구의 나침반이 되고 있다.`,
  `토마스 쿤의 《과학혁명의 구조》는 과학이 발전하는 방식에 대한 기존 인식을 근본적으로 뒤흔든 과학철학의 고전이다. 쿤은 과학이 지식의 점진적 축적이 아니라 패러다임 전환이라는 혁명적 단절을 통해 발전한다고 주장한다. 정상과학 안에서 퍼즐을 풀다가 이상현상이 축적되면 위기가 오고, 새로운 패러다임이 등장하여 과학혁명이 일어난다. 코페르니쿠스의 지동설, 뉴턴의 역학, 아인슈타인의 상대성이론이 대표적 사례이다. 특히 공약 불가능성 개념이 인상적이었다. 뉴턴역학과 상대성이론에서 질량이라는 같은 용어가 전혀 다른 의미를 갖듯이, 서로 다른 패러다임은 동일한 기준으로 비교할 수 없다는 주장은 과학적 객관성에 대해 깊이 생각하게 만들었다. 또한 과학자 공동체의 사회적 역할, 즉 패러다임 선택이 논리만이 아니라 세대 교체와 사회적 합의에 의해서도 결정된다는 관점은 과학의 인간적 측면을 드러낸다. 쿤의 이론이 모든 이론은 동등하다는 상대주의로 귀결된다는 비판도 있으나, 쿤 본인은 후속 패러다임이 더 나은 문제 해결 능력을 가진다고 반박했다. AI가 과학적 방법론 자체를 변화시키고 있는 현재, 우리가 또 하나의 패러다임 전환기에 있는 것은 아닌지 생각해보게 된다.`,
  `칼 세이건의 《코스모스》는 138억 년 우주의 역사를 장대하게 풀어내며, 과학과 인간 존재의 의미를 동시에 탐구하는 과학 문학의 걸작이다. '우리는 별의 먼지로 만들어졌다'는 세이건의 명제는 단순한 시적 표현이 아니다. 빅뱅 이후 별 내부의 핵융합과 초신성 폭발을 통해 탄소와 산소와 철 등이 만들어졌고, 그 원자들이 우리 몸을 구성한다는 엄연한 과학적 사실이다. 우주의 역사를 1년으로 압축한 우주 달력에서 인류 문명이 12월 31일 마지막 몇 초에 불과하다는 비유는, 우주적 겸손과 지구 보호의 필요성을 절감하게 한다. 가장 인상 깊었던 것은 보이저 1호가 60억 km 밖에서 촬영한 창백한 푸른 점 사진이다. 그 작은 점 위에서 인류의 모든 전쟁과 사랑이 펼쳐졌다는 세이건의 통찰은 과학이 기술을 넘어 세계관을 바꾸는 힘이 있음을 보여준다. 기원전 3세기 에라토스테네스가 그림자 각도만으로 지구 둘레를 정밀하게 계산한 일화 또한 관찰과 논리만으로도 놀라운 발견이 가능함을 증명하는 인상적 사례다. 다만 우주에 대한 경이감이 때로 과학적 엄밀성보다 강조되는 면이 있다. 제임스 웹 우주망원경이 외계행성 대기를 분석하는 현재, 세이건의 비전은 현실이 되어가고 있다.`,
  `재러드 다이아몬드의 《총, 균, 쇠》는 문명 간 불균형의 근본 원인을 인종이 아닌 지리와 환경에서 찾는 대담한 학제 간 시도이다. 뉴기니 원주민 얄리의 질문 '왜 백인은 많은 물건을 만들었고 우리는 못했는가?'에 대한 과학적 답변이 이 책 전체의 구조를 이룬다. 핵심 논증은 명쾌하다. 비옥한 초승달 지대에 작물화와 가축화 가능한 동식물이 집중되어 최초의 농업혁명이 시작되었고, 유라시아의 동서 축이 같은 위도대의 유사한 기후를 이용한 빠른 기술 전파를 가능하게 했다. 피사로의 168명이 잉카 제국을 정복한 사례에서 총과 균과 쇠의 결정적 역할은 이 논증을 극적으로 뒷받침한다. 가축과의 접촉에서 면역을 얻은 유라시아인의 전염병이 아메리카 원주민 인구의 대다수를 사망시킨 사실은 충격적이다. 중국이 유럽보다 먼저 화약과 나침반을 발명하고도 뒤처진 역설을 정치적 통일의 위험성으로 설명하는 대목도 흥미롭다. 다만 환경만으로 역사를 설명하려는 환경결정론의 한계가 존재하며, 문화적 선택과 개인의 역할을 과소평가한다는 비판도 충분히 타당하다. 과학고 학생으로서 이 책은 생물학과 지리학과 역사학의 경계를 넘나드는 융합적 사고의 힘을 직접 체험하게 해주었다.`,
  `제러미 리프킨의 《엔트로피》는 열역학 제2법칙이라는 물리학 원리를 경제와 사회, 문명 전체로 확장 적용하는 독특한 시각을 제공한다. 핵심 논지는 간결하다. 모든 경제 활동은 낮은 엔트로피 자원을 높은 엔트로피로 변환하는 과정이며, 성장 중심 경제는 이 변환을 가속화하여 궁극적으로 지속 불가능하다는 것이다. 화석연료를 '수억 년에 걸친 태양 에너지의 저축'으로 비유하며 이를 수십 년 만에 소진하는 현대 문명의 위험성을 경고하는 대목이 인상적이었다. 또한 제번스 역설, 즉 효율이 높아지면 사용 비용이 줄어 오히려 총 소비량이 증가할 수 있다는 역설은 기술만으로 환경 문제를 해결할 수 없음을 시사한다. 볼츠만의 엔트로피 공식이 보여주듯 무질서한 상태가 질서 있는 상태보다 압도적으로 많기에 자연은 자발적으로 무질서로 향한다는 물리학적 근거도 설득력이 있다. 그러나 비판적 시각도 필요하다. 열역학 법칙을 사회에 직접 적용하는 것이 엄밀한 과학인지, 핵융합 같은 혁신적 에너지원의 가능성을 과소평가하는 것은 아닌지 의문이 남는다. 기후변화가 가속화되는 현재, 에너지 전환 논의의 근본에 엔트로피 원리가 있음을 이해하는 것은 미래 과학자에게 필수적이다.`,
  `마이 티 응우옌-킴의 《세상은 온통 화학이야》는 화학이 실험실 안의 추상적 학문이 아니라 일상 모든 순간에 작동하는 실용적 과학임을 친근하게 보여준다. 저자는 유기화학 박사이자 독일 최고의 과학 유튜버로서, 복잡한 화학을 누구나 이해할 수 있는 언어로 풀어내는 탁월한 능력을 보여준다. 이 책의 가장 큰 기여는 케모포비아에 대한 과학적 해독제를 제공한다는 것이다. 천연은 안전하고 화학은 위험하다는 공식이 왜 틀린지를 복어 독이라는 천연이지만 치명적인 물질, 물이라는 화학물질이지만 필수적인 물질의 사례로 명쾌하게 설명한다. 파라켈수스의 '용량이 독을 결정한다'는 원리는 건강기능식품과 화학물질에 대한 합리적 판단의 기초가 된다. 비누가 바이러스의 지질막을 분해하는 원리, 카페인이 아데노신 수용체를 차단하는 메커니즘, 자외선 차단제의 작동 방식 등 일상 속 화학 설명도 흥미롭다. 코로나19 팬데믹 기간 저자가 보여준 과학 기반 정보 전달의 모범은 과학 커뮤니케이션의 중요성을 실감하게 한다. 다만 대중서의 한계로 화학 반응의 수학적 기초까지 다루지 못하는 점은 아쉽다. 미세플라스틱 문제와 AI 기반 신약 개발이 화두인 현재, 화학적 리터러시의 중요성을 실감하게 해준 책이다.`
];

GRADE1.forEach((b,i) => { b.report = REPORTS[i]; });

const G2_REPORTS = [
  `더글라스 호프스태터의 《괴델, 에셔, 바흐》는 수학의 괴델, 미술의 에셔, 음악의 바흐라는 세 거장의 작업에서 자기참조와 재귀라는 공통 구조를 발견하는 지적 모험이다. 바흐의 푸가에서 주제가 변형되어 원래로 돌아오는 구조, 에셔의 그림에서 계단이 끝없이 올라가다 출발점으로 회귀하는 구조, 괴델의 정리에서 수학 체계가 자기 자신에 대해 진술하는 구조가 모두 이상한 루프라는 개념으로 연결된다. 가장 인상 깊었던 것은 괴델의 불완전성 정리이다. 충분히 강력한 형식 체계 안에는 참이지만 증명할 수 없는 명제가 반드시 존재한다는 결과는 수학의 완전성에 대한 꿈을 깨뜨린 혁명적 발견이다. 이 책은 의식이란 무엇인가라는 질문까지 이어지며, 자아란 뇌의 물리적 과정에서 창발하는 이상한 루프라는 대담한 가설을 제시한다. AI가 인간 수준의 추론에 근접하는 현재, 기계에 의식이 있을 수 있는가라는 호프스태터의 질문은 그 어느 때보다 절실한 현실적 문제가 되었다.`,
  `모리스 클라인의 《수학의 확실성》은 수학이 절대 진리라는 통념에 도전하는 수학사 철학서이다. 비유클리드 기하학의 발견, 무한의 역설, 집합론의 모순, 괴델의 불완전성 정리 등이 수학의 확실성을 침식한 과정을 추적한다. 2천 년간 절대 진리로 여겨진 유클리드 기하학이 여러 대안 기하학 중 하나에 불과하다는 발견이 가장 충격적이었다. 논리주의와 형식주의와 직관주의가 수학의 기초를 세우려 했으나 모두 완전히 성공하지 못한 과정도 인상적이다. 다만 수학의 위기를 다소 과장한 면이 있다. 수학은 불완전하지만 과학의 언어로서 놀라운 유효성을 보여주기 때문이다. 이 책은 수학을 맹목적으로 신뢰하기보다 한계와 가능성을 동시에 인식하는 성숙한 시각을 갖게 해주었다. 컴퓨터 증명 검증이 수학의 확실성을 새롭게 보장하는 현재, 클라인의 통찰은 새로운 의미를 얻고 있다.`,
  `하이젠베르크의 《부분과 전체》는 양자역학 탄생의 핵심 인물이 자신의 지적 여정과 동료 과학자들과의 대화를 통해 물리학의 혁명적 전환을 생생히 전하는 자전적 에세이이다. 이 책의 가장 큰 가치는 위대한 과학 발견이 고독한 천재의 번뜩임이 아닌 깊은 대화와 논쟁에서 비롯됨을 보여주는 것이다. 보어와의 토론에서 양자역학의 해석이 구체화되고, 아인슈타인과의 논쟁에서 이론이 정제되는 과정은 과학이 본질적으로 사회적 활동임을 증명한다. 불확정성 원리의 발견 과정도 흥미롭다. 관측 가능한 양에만 집중하자는 아이디어가 꽃가루 알레르기로 요양하던 헬골란트 섬에서 탄생했다는 일화는 일상에서 벗어난 환경이 창의성을 자극할 수 있음을 보여준다. 그러나 이 책에서 가장 무겁게 다가온 것은 나치 시대 하이젠베르크의 선택이다. 과학적 능력과 도덕적 판단의 괴리는 과학자의 사회적 책임이라는 영원한 질문을 남긴다. 다만 이 회고록이 자기변호적 측면이 있다는 비판도 고려해야 한다. 양자컴퓨팅이 현실화되는 현재, 양자역학의 인간적 탄생 이야기는 더욱 의미 있다.`,
  `스티븐 호킹의 《시간의 역사》는 우주의 기원과 시간의 본질에 대한 현대 물리학의 최전선을 수식 하나 없이 대중에게 전달하려는 대담한 시도이다. 블랙홀이 양자 효과에 의해 복사를 방출하고 결국 증발한다는 호킹 복사의 발견은, 양자역학과 일반상대론이 결합할 때 나타나는 놀라운 결과를 보여준다. 시간의 화살 문제도 인상적이다. 왜 시간은 한 방향으로만 흐르는가라는 질문에 대해 열역학적, 심리적, 우주론적 세 가지 화살이 같은 방향을 가리킨다는 설명은 물리학의 깊이를 느끼게 한다. 호킹의 무경계 가설, 즉 우주는 시간적 시작점이 없는 닫힌 구조라는 제안은 빅뱅 이전이라는 개념 자체를 무의미하게 만드는 대담한 사고이다. 또한 블랙홀 정보 역설은 양자역학의 정보 보존과 일반상대론의 예측이 충돌하는 현대 물리학 최대의 미해결 문제임을 알게 되었다. 다만 출간이 1988년이라 힉스 입자 발견이나 중력파 관측 등 이후의 발전이 반영되지 않은 한계가 있다. ALS를 극복하며 우주의 비밀을 파헤친 호킹의 삶 자체가 인간 정신의 무한한 가능성을 증명한다.`,
  `프리모 레비의 《주기율표》는 주기율표의 원소를 장(章) 제목으로 삼아 자전적 경험을 화학의 언어로 풀어낸 독보적인 작품이다. 아르곤으로 시작하여 유대인 선조의 비활성 기체 같은 고립된 삶을 묘사하고, 아우슈비츠에서의 생존 경험을 세륨과 연결하며, 탄소로 생명의 순환을 추적하는 구조는 과학과 문학의 경계를 완전히 허문다. 가장 충격적이었던 것은 아우슈비츠에서 화학 지식이 문자 그대로 목숨을 구한 이야기이다. 실험실 보조로 배치되어 혹한을 피할 수 있었다는 사실은, 지식이 생존의 도구가 될 수 있음을 극단적으로 보여준다. 또한 전쟁 후 페인트 공장에서의 화학자 일상, 불순물과 싸우는 과정에서 느끼는 장인적 보람 등은 화학이 추상이 아닌 삶의 일부임을 실감하게 한다. 탄소 원자 하나가 수억 년에 걸쳐 석회암에서 포도주로, 공기에서 나뭇잎으로 여행하는 마지막 장은 과학적 상상력의 극치이다. 이 책은 과학이 인간의 경험, 역사, 윤리와 어떻게 얽혀 있는지를 보여주며, 과학고 학생에게 인문학적 감수성의 중요성을 일깨워준다.`,
  `페니 르쿠터의 《나폴레옹의 단추》은 17개 핵심 분자가 어떻게 세계 역사를 바꾸었는지를 추적하는 흥미로운 화학-역사 융합서이다. 책 제목은 나폴레옹 군복의 주석 단추가 러시아의 혹한에서 알파 주석에서 베타 주석으로 상전이하여 부서졌고, 이것이 병사들의 동사를 가속화하여 원정 실패의 한 원인이 되었다는 가설에서 유래한다. 분자의 화학적 성질 하나가 제국의 운명을 바꿀 수 있다는 이 이야기는 화학의 역사적 힘을 극적으로 보여준다. 가장 인상 깊었던 것은 향신료 분자들의 이야기이다. 후추의 피페린, 정향의 유제놀 등 작은 유기 분자가 대항해시대를 촉발하고 식민지 전쟁을 일으켰다는 사실은 화학과 지정학의 의외의 연결을 보여준다. 또한 아스피린, 페니실린 등 의약품 분자가 인류 수명을 혁명적으로 연장한 과정도 흥미롭다. 이성질체, 즉 같은 분자식이지만 구조가 다른 분자들이 전혀 다른 효과를 낸다는 설명은 분자 구조의 결정적 중요성을 깨닫게 해주었다. 화학이 단순한 실험실 학문이 아니라 문명의 원동력임을 실감하게 하는 책이다.`,
  `제임스 왓슨의 《이중나선》은 DNA 구조 발견이라는 20세기 최대의 과학적 업적이 이루어진 과정을 당사자가 솔직하고도 논쟁적으로 기록한 과학 회고록이다. 이 책의 가장 큰 가치는 과학 발견의 교과서적 이미지를 깨뜨리는 것이다. 왓슨과 크릭의 발견 과정은 체계적 실험보다 모형 만들기와 직관적 추론에 의존했으며, 라이너스 폴링과의 치열한 경쟁 의식이 중요한 동기가 되었다. 그러나 이 책에서 가장 비판적으로 읽어야 할 부분은 로잘린드 프랭클린에 대한 서술이다. 프랭클린의 X선 결정학 사진 51번이 DNA 구조 규명의 결정적 단서였음에도 그녀의 기여가 충분히 인정받지 못한 것은 당시 과학계의 성차별을 보여준다. 또한 왓슨의 서술이 프랭클린에게 불공정하다는 비판이 지속적으로 제기되어왔다. 과학 발견의 인간적 측면과 함께 구조생물학의 핵심 원리, 즉 분자의 3차원 구조가 곧 기능을 결정한다는 통찰을 이해하게 되었다. 과학에서의 공정한 공로 인정과 다양성 존중이 왜 중요한지를 깨닫게 해준 책이다.`,
  `에드워드 윌슨의 《통섭》은 자연과학, 인문학, 사회과학의 지식이 하나의 통합된 체계로 연결될 수 있다는 대담한 비전을 제시한다. 윌슨은 계몽주의의 통합적 지식관을 현대 과학의 성과로 부활시키며, 물리학에서 생물학으로, 생물학에서 심리학으로, 심리학에서 사회과학으로 이어지는 지식의 연결 사슬을 제안한다. 가장 인상적이었던 것은 인간의 도덕 감정과 미적 판단까지도 진화적 적응의 산물일 수 있다는 주장이다. 윤리학이 순수한 철학이 아니라 진화생물학과 신경과학에 기반할 수 있다는 관점은 학문 간 경계에 대한 근본적 도전이다. 또한 환경윤리가 생태학적 지식에 기반해야 한다는 주장은 기후변화 시대에 특히 설득력이 있다. 그러나 통섭의 비전에 대해 비판적 시각도 필요하다. 자연과학으로 인문학을 환원하려는 시도가 인간 경험의 복잡성을 단순화한다는 비판과, 문화적 다양성을 생물학적으로 설명하려는 것이 결정론에 빠질 수 있다는 우려도 타당하다. 과학고 학생으로서 분야 간 경계를 넘나드는 융합적 사고의 가치와 위험을 동시에 배울 수 있었다.`,
  `제임스 글릭의 《카오스》는 결정론적 방정식에서 예측 불가능한 행동이 나타날 수 있다는 카오스 이론의 탄생을 추적하는 과학 논픽션의 고전이다. 뉴턴 이래 과학은 초기 조건을 알면 미래를 정확히 예측할 수 있다고 믿어왔다. 그러나 로렌츠가 기상 모델에서 소수점 이하 미세한 차이가 완전히 다른 날씨를 만드는 것을 발견하면서 이 확신이 무너졌다. 이것이 유명한 나비 효과이다. 가장 인상적이었던 것은 만델브로의 프랙탈 기하학이다. 해안선의 길이가 측정 자의 크기에 따라 달라진다는 관찰에서 시작하여, 자연의 불규칙한 형태를 기술하는 새로운 수학을 탄생시킨 과정은 관점의 전환이 가져오는 혁신을 보여준다. 또한 파이겐바움의 보편 상수가 전혀 다른 물리 시스템에서 동일하게 나타난다는 발견은 카오스 속에도 보편적 법칙이 존재함을 시사한다. 다만 이 책이 카오스 이론의 혁명성을 다소 과장한다는 비판도 있다. 기후 모델링과 AI 예측이 복잡계 과학에 의존하는 현재, 카오스 이론의 기본 개념을 이해하는 것은 과학고 학생에게 필수적이다.`,
  `화이트헤드의 《과학과 근대세계》는 17세기 과학혁명이 어떻게 근대 세계를 형성했으며, 그 기계론적 세계관이 가진 한계가 무엇인지를 탐구하는 과학철학의 고전이다. 뉴턴과 갈릴레오 이후 자연을 수학적 법칙에 따르는 기계로 보는 관점이 지배적이 되었으나, 화이트헤드는 이 환원적 유물론이 생명, 의식, 미적 경험, 가치 등 실재의 본질적 측면을 누락한다고 비판한다. 가장 인상적이었던 것은 구체성의 오류라는 개념이다. 추상적 수학 모델을 구체적 현실 그 자체로 착각하는 오류가 근대 과학의 고질적 문제라는 지적은 날카롭다. 화이트헤드는 대안으로 유기체 철학을 제시하며, 모든 존재를 정적 실체가 아닌 동적 과정으로 이해해야 한다고 주장한다. 이는 양자역학의 과정적 성격, 생태학의 유기체적 관계, 복잡계의 창발 현상과 깊이 공명한다. 다만 화이트헤드의 문체가 극도로 추상적이고 난해하여 접근성이 낮다는 한계가 있다. 과학기술이 사회를 급격히 변화시키는 현재, 과학의 성과와 한계를 철학적으로 성찰하는 이 책의 가치는 오히려 커지고 있다.`,
  `레이첼 카슨의 《침묵의 봄》은 DDT 등 합성 살충제의 생태계 파괴를 과학적으로 고발하여 현대 환경운동의 시발점이 된 기념비적 저작이다. 제목은 새가 사라져 봄이 와도 새소리가 들리지 않는 미래를 상상한 것으로, 강렬한 시작이 독자의 마음을 사로잡는다. 카슨은 DDT가 먹이사슬을 통해 생물농축되어 매와 독수리의 알 껍질을 얇게 만들고, 수생 생태계를 오염시키며, 인간에게도 암 위험을 높인다는 증거를 체계적으로 제시했다. 가장 인상 깊었던 것은 생태계의 상호 연결성에 대한 통찰이다. 살충제로 한 종을 제거하면 그 천적이 사라지고, 내성을 가진 해충이 오히려 폭발하는 역설적 상황은 단순한 기술적 해결책의 위험성을 보여준다. 화학 업계의 조직적 공격에도 불구하고 과학적 사실에 기반한 카슨의 용기는 과학자의 사회적 책임의 모범이다. 다만 DDT의 말라리아 퇴치 공로도 인정해야 한다는 균형 잡힌 시각이 필요하다. 기후변화와 미세플라스틱 오염이 심각한 현재, 이 책의 경고는 60년이 지난 지금도 유효하다.`,
  `레이 커즈와일의 《특이점이 온다》는 기술 발전의 지수적 가속이 인류 문명을 근본적으로 변혁할 특이점으로 이끌고 있다는 대담한 예측을 제시한다. 커즈와일은 무어의 법칙을 넘어 수확 가속의 법칙을 제안한다. 기술은 선형이 아닌 지수적으로 발전하며, 이 가속은 점점 빨라져 2045년경 인공지능이 인간 지능을 초월하는 특이점에 도달한다는 것이다. 나노기술로 인체를 분자 수준에서 수리하고, 유전공학으로 질병을 제거하며, AI와 뇌를 직접 연결하여 지능을 증강한다는 비전은 SF를 현실로 옮기는 것처럼 보인다. 실제로 2026년 현재 대규모 언어모델의 급격한 발전은 커즈와일의 예측이 완전히 허무맹랑하지 않았음을 보여준다. 그러나 기술 결정론적 시각에 대한 비판은 필수적이다. 기술 발전이 항상 인류에게 이로운 것은 아니며, AI 안전성, 기술 불평등, 인간 정체성의 문제 등이 해결되지 않은 채 특이점을 맞이할 위험이 있다. 이 책은 기술 낙관주의의 흥분과 함께 비판적 사고의 필요성을 동시에 일깨워주었다.`
];

const G3_REPORTS = [
  `아이작 뉴턴의 《프린키피아》는 자연철학의 수학적 원리라는 원제가 보여주듯, 자연 현상을 수학적 언어로 기술하는 근대 과학의 패러다임을 확립한 인류 지성사의 최고 걸작이다. 세 가지 운동 법칙과 만유인력 법칙만으로 사과의 낙하에서 행성의 공전까지 설명하는 통합의 우아함은 경이롭다. 가장 인상 깊었던 것은 뉴턴이 지상의 역학과 천상의 역학을 하나의 체계로 통합한 점이다. 아리스토텔레스 이래 2천 년간 분리되어 있던 두 세계가 하나의 수학적 법칙으로 연결되는 순간은 과학사의 가장 위대한 지적 도약이다. 또한 미적분이라는 새로운 수학 도구를 스스로 발명하여 운동을 정밀하게 기술한 것은 과학과 수학의 불가분 관계를 보여준다. 그러나 뉴턴 역학의 한계도 인식해야 한다. 빛의 속도에 가까운 영역에서는 상대성이론이, 원자 이하 영역에서는 양자역학이 필요하다. 이는 어떤 과학 이론도 영원불변이 아님을 보여준다. 과학고 학생으로서 뉴턴의 업적을 존경하면서도 그 한계를 이해하는 것이 진정한 과학적 태도임을 배웠다.`,
  `아인슈타인의 상대성 이론은 뉴턴 이래 200년간 확고했던 절대적 시간과 공간의 개념을 근본적으로 뒤엎은 물리학의 혁명이다. 특수상대론에서 빛의 속도가 모든 관측자에게 동일하다는 단순한 원리에서 시간 팽창, 길이 수축, 질량-에너지 등가(E=mc²)라는 놀라운 결과가 도출되는 과정은 논리적 사고의 극치를 보여준다. 일반상대론은 더욱 대담하다. 중력이 힘이 아니라 질량과 에너지에 의한 시공간의 곡률이라는 기하학적 해석은, 뉴턴의 만유인력을 완전히 새로운 차원에서 재해석한다. 가장 인상 깊었던 것은 1919년 일식 관측에서 태양 옆을 지나는 별빛의 휨이 일반상대론의 예측과 일치한 역사적 순간이다. 이론의 아름다움이 자연에 의해 확인되는 과학의 궁극적 순간이었다. GPS 위성의 시간 보정에 상대론이 사용되는 것은 이 추상적 이론의 실용적 가치를 보여준다. 중력파 관측, 블랙홀 촬영 등 2026년 현재에도 상대론의 예측이 계속 확인되고 있으며, 양자중력이론이라는 다음 혁명을 향한 출발점이 되고 있다.`,
  `찰스 다윈의 《종의 기원》은 자연선택에 의한 진화라는 단순하면서도 강력한 원리로 생명의 다양성을 설명하여 생물학의 패러다임을 영원히 바꾼 역작이다. 다윈의 논증은 네 단계로 전개된다. 개체들 사이에 변이가 존재하고, 자원은 한정되어 생존 경쟁이 벌어지며, 환경에 유리한 변이를 가진 개체가 더 많이 번식하고, 이 유리한 형질이 다음 세대에 전달되어 축적된다. 이 단순한 메커니즘이 수십억 년에 걸쳐 작동하여 박테리아에서 인간에 이르는 모든 생명의 다양성을 만들어냈다. 가장 인상 깊었던 것은 다윈이 자신의 이론에 대한 반론을 스스로 제기하고 답변하는 지적 정직성이다. 눈처럼 복잡한 기관의 진화, 화석 기록의 불완전성 등 약점을 회피하지 않고 정면으로 다루는 태도는 과학적 글쓰기의 모범이다. 다만 다윈은 유전의 메커니즘(DNA)을 알지 못했으며, 멘델의 유전학과의 종합은 후대에 이루어졌다. 유전체학과 CRISPR가 발전한 현재, 다윈의 통찰은 분자 수준에서 더욱 정교하게 확인되고 확장되고 있다.`,
  `괴델의 불완전성 정리는 20세기 수학과 철학에서 가장 충격적인 발견 중 하나이다. 제1 불완전성 정리는 자연수의 산술을 포함하는 무모순적 형식 체계에는 반드시 참이지만 그 체계 안에서 증명할 수 없는 명제가 존재한다는 것이다. 이는 힐베르트가 꿈꿨던 수학의 완전한 형식화가 원리적으로 불가능함을 증명한 것으로, 수학 기초론의 풍경을 영원히 바꿔놓았다. 제2 정리는 더욱 충격적이다. 그러한 체계는 자기 자신의 무모순성도 증명할 수 없다. 증명의 핵심은 괴델 번호 매기기라는 기법으로, 수학적 명제를 자연수에 대응시켜 체계가 자기 자신에 대해 말할 수 있게 만든 것이다. 이 자기참조적 구조에서 이 명제는 증명 불가능하다라는 문장을 구성함으로써 역설적 상황을 만들어낸다. 가장 인상적인 것은 이 결과가 수학의 약점이 아니라 오히려 깊이를 보여준다는 점이다. 수학적 진리는 어떤 형식 체계보다도 풍부하다는 의미이기 때문이다. 다만 이 정리가 인간 사고나 AI의 한계에 대해 시사하는 바는 여전히 철학적 논쟁의 대상이다.`,
  `파인만의 《양자역학과 경로적분》은 양자역학을 완전히 새로운 관점에서 재형식화한 독창적 저작이다. 슈뢰딩거의 파동함수나 하이젠베르크의 행렬 대신, 입자가 A에서 B로 갈 때 가능한 모든 경로를 동시에 고려하고 각 경로의 기여를 합산한다는 아이디어는 양자역학의 가장 직관적이면서도 심오한 해석이다. 각 경로는 작용(action)에 비례하는 위상을 갖고, 이 위상들의 간섭이 양자역학적 확률을 결정한다. 고전역학에서는 작용이 최소인 경로 하나만 실현되지만, 양자역학에서는 모든 경로가 기여한다는 점이 핵심적 차이이다. 이것이 고전역학의 최소작용원리가 양자적으로 일반화되는 아름다운 방식이다. 이중 슬릿 실험에서 입자가 두 슬릿을 동시에 통과한다는 양자적 기묘함이 경로적분의 관점에서는 자연스럽게 설명된다. 다만 이 책은 수학적 수준이 높아 상당한 물리·수학 배경이 필요하다. 양자장론과 양자중력의 핵심 도구가 된 경로적분의 보편성은 파인만의 천재성을 증명하며, 물리학의 심층 구조를 이해하려는 과학고 학생에게 도전적이면서도 보람 있는 독서가 될 것이다.`,
  `유발 하라리의 《사피엔스》는 호모 사피엔스가 지구를 지배하게 된 과정을 인지혁명, 농업혁명, 과학혁명이라는 세 차례의 혁명으로 설명하는 거시 역사서이다. 가장 혁신적인 통찰은 인지혁명의 핵심이 허구를 만들고 공유하는 능력이라는 주장이다. 국가, 화폐, 종교, 법률, 기업 등은 모두 인간의 상상 속에만 존재하는 허구이지만, 이 허구가 수만 명의 협력을 가능케 하여 다른 동물과의 결정적 차이를 만들었다. 농업혁명이 역사 최대의 사기라는 도발적 주장도 인상적이다. 인류는 밀을 길들인 것이 아니라 밀에 의해 길들여졌으며, 농업은 더 긴 노동시간과 영양 불균형, 전염병 증가를 가져왔다는 역설적 분석은 진보에 대한 반성을 요구한다. 과학혁명의 핵심이 무지의 인정이라는 관점도 설득력이 있다. 다만 하라리의 주장이 때로 과도하게 단순화되고, 복잡한 역사적 과정을 하나의 내러티브로 환원한다는 비판도 유효하다. 생명공학과 AI가 인류의 정의 자체를 바꿀 수 있는 현재, 이 책이 던지는 질문은 더욱 절실해지고 있다.`

function save(){localStorage.setItem("rs2",JSON.stringify(statuses))}
function getSt(id){return statuses[id]||0}
function cycleSt(id){statuses[id]=((getSt(id)+1)%4);save();render();}

function getBooks(){return tab===1?GRADE1:tab===2?GRADE2:GRADE3}
function hasDetail(){return true}

/* ═══ RENDER ═══ */
function render(){
  const app=document.getElementById("app");
  const bks=getBooks(), hd=hasDetail();
  const g1done=GRADE1.filter(b=>getSt(b.id)>=2).length;
  const g1total=GRADE1.length;
  const pct=Math.round((g1done/g1total)*100);
  const circ=2*Math.PI*42;
  const offset=circ-(circ*pct/100);

  let h=`<div class="hdr"><h1>📖 과학고 심화 독서 프로젝트</h1><p>한성과학고 · 3년 심화 독서 로드맵</p></div>`;

  // Progress ring
  h+=`<div class="ring-wrap"><div class="ring-box">
    <svg viewBox="0 0 100 100">
      <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#38bdf8"/></linearGradient></defs>
      <circle class="ring-track" cx="50" cy="50" r="42"/>
      <circle class="ring-fill" cx="50" cy="50" r="42" stroke-dasharray="${circ}" stroke-dashoffset="${offset}" transform="rotate(-90 50 50)"/>
      <text x="50" y="48" text-anchor="middle" fill="#f1f5f9" font-size="20" font-weight="800">${pct}%</text>
      <text x="50" y="62" text-anchor="middle" fill="#94a3b8" font-size="9">달성률</text>
    </svg>
    <div class="ring-stats">
      <div class="ring-stat"><div class="n">${g1total}</div><div class="l">총 도서</div></div>
      <div class="ring-stat"><div class="n" style="color:#10b981">${g1done}</div><div class="l">완료</div></div>
      <div class="ring-stat"><div class="n" style="color:#6366f1">${hd?g1total*20:'-'}</div><div class="l">플래시카드</div></div>
    </div>
  </div></div>`;

  // Grade tabs
  h+=`<div class="gtabs">`;
  [1,2,3].forEach(g=>{
    const cnt=g===1?GRADE1:g===2?GRADE2:GRADE3;
    const labels=["탐색기","심화기","종합기"];
    h+=`<button class="gtab${tab===g?' on':''}" onclick="tab=${g};openId=null;render()">
      ${g}학년<small>${labels[g-1]} · ${cnt.length}권</small></button>`;
  });
  h+=`</div>`;

  if(!hd){
    h+=`<div class="coming"><h3>📌 ${tab}학년 콘텐츠 준비 중</h3><p>독서록·플래시 카드는 해당 학년 진입 시 추가됩니다.</p></div>`;
  }

  // Roadmap
  h+=`<div class="roadmap">`;
  bks.forEach((b,i)=>{
    const st=getSt(b.id);
    const si=STATUS[st];
    const color=FIELDS[b.field]||"#64748b";
    const isOpen=openId===b.id;

    h+=`<div class="rm-item">
      <div class="rm-dot ${si.cls}" onclick="cycleSt(${b.id})" title="${si.label}">${st===0?(i+1):si.icon}</div>
      <div class="rm-card">
        <div class="rm-top">
          <span class="badge" style="background:${color}">${b.field}</span>
          <span class="rm-title">${b.title}</span>
        </div>
        <div class="rm-author">${b.author}</div>
        <div class="rm-status">
          <span style="color:${st===0?'#64748b':st===1?'#38bdf8':st===2?'#10b981':'#a78bfa'}">${st===0?'○':st===1?'◐':st===2?'●':'✓'} ${si.label}</span>
          <span style="color:#475569;font-size:10px">· 원형 클릭으로 상태 변경</span>
        </div>`;
    
    if(hd){
      h+=`<div class="rm-actions">
        <button class="abtn rep" onclick="toggle(${b.id},'report')">📝 독서록</button>
        <button class="abtn info" onclick="toggle(${b.id},'info')">📚 저자·핵심</button>
        <button class="abtn fc" onclick="toggle(${b.id},'flash')">🃏 플래시카드</button>
      </div>`;

      if(isOpen){
        h+=renderPanel(b);
      }
    }
    h+=`</div></div>`;
  });
  h+=`</div>`;

  h+=`<div class="footer"><p>한성과학고등학교 심화 독서 프로젝트 v2.0</p><p class="v">독서록 · 저자정보 · 핵심메시지 · 플래시카드 20장/권 · 2026.04</p></div>`;

  app.innerHTML=h;
  attachFlashEvents();
}

function toggle(id,panel){
  if(openId===id && openPanel===panel){openId=null;}
  else{openId=id;openPanel=panel;cardIdx=0;flipped=false;}
  render();
}

function renderPanel(b){
  let h=`<div class="panel">`;
  
  if(openPanel==="report"){
    h+=`<div class="stitle">📝 독서록</div>`;
    h+=`<div class="report-box">${b.report}</div>`;
    h+=`<div class="char-count">${b.report.length}자</div>`;
  }
  else if(openPanel==="info"){
    h+=`<div class="panel-tabs">
      <button class="ptab${openPanel==='info'?' on':''}" onclick="openPanel='info';render()">저자·핵심</button>
    </div>`;
    h+=`<div class="stitle">📚 저자 소개</div><p class="stext">${b.bio}</p>`;
    h+=`<div class="stitle" style="margin-top:14px">🎯 관련 에피소드</div>`;
    b.episodes.forEach((e,i)=>{h+=`<div class="episode"><span class="ep-n">${i+1}</span><span class="stext" style="font-size:12px">${e}</span></div>`;});
    h+=`<div class="stitle" style="margin-top:14px">💡 핵심 메시지</div>`;
    b.keys.forEach((k,i)=>{h+=`<div class="key-row"><div class="key-n">${i+1}</div><div class="key-t">${k}</div></div>`;});
  }
  else if(openPanel==="flash"){
    const card=b.cards[cardIdx];
    const pct=((cardIdx+1)/b.cards.length)*100;
    h+=`<div class="fc-bar"><div class="fc-fill" style="width:${pct}%"></div></div>`;
    h+=`<div class="fc-counter">플래시 카드 ${cardIdx+1} / ${b.cards.length}</div>`;
    h+=`<div class="fc-area" id="fcArea">
      <div class="fc-card ${flipped?'fc-back':'fc-front'}">
        <div class="fc-inner">
          <div class="fc-icon ${flipped?'a':'q'}">${flipped?'A':'Q'}</div>
          <p class="fc-text">${flipped?card[1]:card[0]}</p>
          <p class="fc-hint">${flipped?'탭→질문':'탭→정답'}</p>
        </div>
      </div>
    </div>`;
    h+=`<div class="fc-nav">
      <button class="fc-btn" id="fcPrev" ${cardIdx===0?'disabled':''}>◀ 이전</button>
      <span class="fc-mid">${cardIdx+1} / ${b.cards.length}</span>
      <button class="fc-btn" id="fcNext" ${cardIdx>=b.cards.length-1?'disabled':''}>다음 ▶</button>
    </div>`;
    h+=`<p class="fc-swipe">좌우 스와이프 · 키보드 ←→</p>`;
  }
  h+=`</div>`;
  return h;
}

let tx=null;
function attachFlashEvents(){
  const area=document.getElementById("fcArea");
  if(!area)return;
  area.onclick=()=>{flipped=!flipped;render();};
  area.ontouchstart=(e)=>{tx=e.touches[0].clientX;};
  area.ontouchend=(e)=>{
    if(tx===null)return;
    const d=e.changedTouches[0].clientX-tx;
    const b=GRADE1.find(x=>x.id===openId);
    if(b&&Math.abs(d)>50){
      if(d<0&&cardIdx<b.cards.length-1){cardIdx++;flipped=false;render();}
      else if(d>0&&cardIdx>0){cardIdx--;flipped=false;render();}
    }
    tx=null;
  };
  const prev=document.getElementById("fcPrev");
  const next=document.getElementById("fcNext");
  if(prev)prev.onclick=(e)=>{e.stopPropagation();if(cardIdx>0){cardIdx--;flipped=false;render();}};
  if(next)next.onclick=(e)=>{e.stopPropagation();const b=GRADE1.find(x=>x.id===openId);if(b&&cardIdx<b.cards.length-1){cardIdx++;flipped=false;render();}};
}

document.addEventListener("keydown",(e)=>{
  if(!openId||openPanel!=="flash")return;
  const b=GRADE1.find(x=>x.id===openId);if(!b)return;
  if(e.key==="ArrowLeft"&&cardIdx>0){cardIdx--;flipped=false;render();}
  if(e.key==="ArrowRight"&&cardIdx<b.cards.length-1){cardIdx++;flipped=false;render();}
  if(e.key===" "||e.key==="Enter"){flipped=!flipped;render();e.preventDefault();}
});

render();
</script>
</body>
</html>
